# smart_copy_live — deterministic smart-money copy trading for live use.
#
# Thesis: copy only recent, multi-wallet public order flow from profitable
# traders, then reject setups where one whale dominates the signal or the
# current ask is too far above the cohort's average fill.

[run]
starting_cash = 20.0
mode = "smart_money"

[sizing]
position_pct = 0.10
max_position_ceiling_usd = 3.0
max_position_ceiling_pct = 0.15
max_trade_usd = 3.0
high_conviction_balance_fraction = 0.20
cash_floor_pct = 0.10
min_open_positions = 0
starter_trade_usd = 1.5
assumed_live_balance_usd = 20.0

[trader_cohort]
leaderboard_window = "MONTH"
leaderboard_windows = "WEEK,MONTH,ALL"
top_n = 75
min_trader_pnl = 1000.0
min_trader_volume = 2000.0
min_trader_roi = 0.03
trade_fetch_concurrency = 16
trade_lookback_minutes = 90

[discovery]
scan_limit = 1000
soon_hours = 48
fresh_signal_bonus = 10.0
priority_category_bonus = 6.0

[market_filters]
min_liquidity_usd = 300.0
min_volume_usd = 300.0

[filters]
min_consensus = 2
fallback_consensus = 2
min_copied_usdc = 150.0
min_wallet_flow_usdc = 25.0
max_wallet_flow_share = 0.80
min_fresh_wallets = 2
fresh_wallet_minutes = 60
min_trade_usd = 1.0
max_chase_premium = 0.08
price_min = 0.08
price_max = 0.90
max_absolute_spread = 0.05
max_relative_spread = 0.30
signal_staleness_seconds = 90
min_hours_to_close = 0.5
max_hours_to_close = 48.0
max_orders_per_tick = 1
max_sports_positions = 2
sports_score_penalty = 8.0

[crypto]
min_buy_price = 0.70
min_hours_to_close = 6.0
max_hours_to_close = 48.0
min_copied_usdc = 1000.0
min_consensus = 3
micro_min_consensus = 3
micro_max_entry_slippage = 0.03
micro_max_trade_usd = 3.0

[execution]
max_entry_slippage = 0.05
pending_order_ttl_seconds = 45
min_sell_usd = 1.0

[exits]
take_profit_ladder = "0.25:0.20,0.50:0.30,1.0:0.50,2.0:0.25"
trailing_stop_arm_pct = 0.20
trailing_stop_giveback = 0.40
peak_protect_arm_pct = 0.50
peak_protect_exit_pct = 0.25
stop_loss_pct = 0.25
stop_loss_min_age_minutes = 10
max_hold_hours = 24.0
near_expiry_min_profit = 0.05
near_expiry_minutes_to_close = 20
near_expiry_exit_losers = true
near_expiry_loser_minutes = 45
resolved_market_threshold = 0.97

[cohort_exit]
enabled = true
lookback_minutes = 60
min_age_minutes = 15
min_wallets = 2

[deep_fallback]
enabled = false

[reverse_lookup]
enabled = true
max_tokens = 50
min_copied_usdc = 100.0
min_liquidity_usd = 300.0
min_volume_usd = 300.0

[btc_edge]
enabled = false
per_trade_cap_usd = 3.0
min_edge_over_market = 0.08
min_buy_price = 0.05
max_buy_price = 0.95
max_spread = 0.04
min_trade_usd = 1.0
min_model_probability = 0.90
min_hours_to_close = 0.5
volatility_days = 7

[noise_fallback]
enabled = false
max_trades_per_tick = 2
stake_usd = 1.5
cash_pressure_threshold = 0.35
min_buy_price = 0.20
max_buy_price = 0.80
max_spread = 0.04

[auto_tune]
enabled = true
min_closed_trades = 30

[persistence]
enabled = true
window_days = 30
cache_threshold = 0.70
intersect_periods = "WEEK,MONTH,ALL"
intersect_min = 2

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15
