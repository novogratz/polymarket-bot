# Profil test — force du volume via noise_fallback pour observer le bot
# en temps réel. À utiliser UNIQUEMENT en dry-run pour vérifier le
# comportement du mark-to-market, des exits et des notifications sur
# une période courte (~quelques minutes).
#
# Stratégie : on serre min_open_positions à 12 et on autorise jusqu'à
# 8 trades de noise par tick à 5$. Le bot va ouvrir des positions
# rapidement et tu pourras voir EQUITY/RETURN/POS bouger en direct.
#
# NE PAS UTILISER EN LIVE — le noise_fallback ne prend aucune décision
# basée sur du signal, c'est du remplissage.

[run]
starting_cash = 100.0

[sizing]
position_pct = 0.10
max_position_ceiling_usd = 15.0
max_position_ceiling_pct = 0.20
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.30
cash_floor_pct = 0.10
min_open_positions = 12                   # élevé → pression d'achat constante
starter_trade_usd = 5.0
assumed_live_balance_usd = 0.0

[trader_cohort]
leaderboard_window = "WEEK"
top_n = 50
min_trader_pnl = 500.0
min_trader_volume = 1000.0
min_trader_roi = 0.02
trade_fetch_concurrency = 16
trade_lookback_minutes = 240

[discovery]
scan_limit = 1000
soon_hours = 72
fresh_signal_bonus = 8.0
priority_category_bonus = 6.0

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 1000.0

[filters]
min_consensus = 2
fallback_consensus = 2
min_copied_usdc = 50.0
min_trade_usd = 1.0
max_chase_premium = 0.12
price_min = 0.03
price_max = 0.97
max_absolute_spread = 0.10
max_relative_spread = 0.35
signal_staleness_seconds = 10
min_hours_to_close = 0.25
max_hours_to_close = 4.0
max_orders_per_tick = 0
max_sports_positions = 3
sports_score_penalty = 8.0

[crypto]
min_buy_price = 0.70
min_hours_to_close = 6.0
max_hours_to_close = 4.0
min_copied_usdc = 1000.0
min_consensus = 3
micro_min_consensus = 3
micro_max_entry_slippage = 0.05
micro_max_trade_usd = 5.0

[execution]
max_entry_slippage = 0.10
pending_order_ttl_seconds = 45
min_sell_usd = 1.0

[exits]
take_profit_ladder = "0.25:0.15,0.5:0.25,1.0:0.50,2.0:0.25,3.0:0.15"
trailing_stop_arm_pct = 0.25
trailing_stop_giveback = 0.50
peak_protect_arm_pct = 1.0
peak_protect_exit_pct = 0.40
stop_loss_pct = 0.40
stop_loss_min_age_minutes = 15
max_hold_hours = 24.0
near_expiry_min_profit = 0.05
near_expiry_minutes_to_close = 20
resolved_market_threshold = 0.97

[cohort_exit]
enabled = true
lookback_minutes = 120
min_age_minutes = 30
min_wallets = 2

[deep_fallback]
enabled = true
min_copied_usdc = 250.0

[reverse_lookup]
enabled = true
max_tokens = 30
min_copied_usdc = 100.0
min_liquidity_usd = 200.0
min_volume_usd = 500.0

[btc_edge]
enabled = false
per_trade_cap_usd = 5.0
min_edge_over_market = 0.08
min_buy_price = 0.05
max_buy_price = 0.95
max_spread = 0.04
min_trade_usd = 1.0
min_model_probability = 0.90
min_hours_to_close = 0.5
volatility_days = 7

[noise_fallback]
enabled = true                            # ← le coeur du profil
max_trades_per_tick = 8                   # ouvre jusqu'à 8 positions par tick
stake_usd = 5.0
stake_pct = 0.15
cash_pressure_threshold = 0.25            # active dès que cash > 25% de l'equity
min_buy_price = 0.30                      # cible la zone la plus volatile
max_buy_price = 0.70
max_spread = 0.06

[auto_tune]
enabled = true
min_closed_trades = 30

[persistence]
enabled = false

[telemetry]
quiet = false
auto_interval_seconds = 10
