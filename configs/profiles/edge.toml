# Profil "edge" — quatre lanes haute-fréquence sur marchés ≤ 4h.
#
# Lanes :
#   1. arbitrage   — binaire YES+NO < (1 - fee_buffer)
#   2. crypto      — spot Binance + momentum 5/15min → fair_prob
#   3. near-cert   — best_bid ≥ 0.92 + ask ≤ 0.96 + < 2h restantes
#   4. scalp       — désactivé par défaut (off-policy actuellement)
#
# Sizing : fractional Kelly (1/4), cap 15% par trade. Stop daily DD
# à -20%. Cash floor 10%.

[run]
starting_cash = 1000.0
mode = "edge"

[sizing]
max_position_ceiling_usd = 25.0
min_open_positions = 0
starter_trade_usd = 2.0
assumed_live_balance_usd = 0.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[execution]
pending_order_ttl_seconds = 60
min_sell_usd = 1.0

[persistence]
enabled = false

[edge]
max_hours = 4.0                         # ⚠ règle dure
scan_limit = 500
min_liquidity_usd = 1000.0
min_volume_24h_usd = 300.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
fee_pct = 0.02                          # estimation slippage + frais
min_edge_pct = 0.025                    # 2.5% edge min après fees (était 4%, trop strict)
kelly_fraction = 0.25                   # 1/4 Kelly (sizing prudent)
max_position_pct = 0.15                 # cap 15% du capital par trade
max_orders_per_tick = 6                 # plus de turnover (était 4)
min_stake_usd = 2.0
cash_floor_pct = 0.10                   # 10% cash réserve
daily_drawdown_pct = 0.20               # halt si -20% sur la journée

# Exits — non-arb
take_profit_pct = 0.25
stop_loss_pct = 0.25
stop_loss_min_age_minutes = 3
tight_stop_hours = 1.0
tight_stop_pct = 0.15
very_tight_stop_hours = 0.5
very_tight_stop_pct = 0.10
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

# Lane arbitrage
arb_fee_buffer = 0.02                   # YES+NO < 0.98 = arb
arb_max_position_pct = 0.25             # arb autorise plus de capital

# Lane crypto directional
crypto_enabled = true
crypto_annual_vol = 0.60                # vol annualisée pour BTC/ETH
crypto_momentum_alpha = 4.0             # sensibilité du momentum 15min

# Lane near-certainty
near_cert_enabled = true
near_cert_max_hours = 3.0               # élargi de 2h à 3h
near_cert_min_bid = 0.82                # élargi de 0.92 à 0.82 (plus de candidats)
near_cert_max_ask = 0.95
near_cert_bias_multiplier = 1.05        # hypothèse: favoris sous-cotés de ~5%

# Lane scalp (off par défaut — manque ordre limite + websocket)
scalp_enabled = false
scalp_min_volume_24h = 5000.0
scalp_max_position_pct = 0.05
scalp_tp_pct = 0.03
scalp_sl_pct = 0.05
scalp_max_age_minutes = 15

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15
