# Profil "edge" — quatre lanes haute-fréquence sur marchés ≤ 4h.
#
# Lanes :
#   1. arbitrage   — binaire YES+NO < (1 - fee_buffer)
#   2. crypto      — spot Binance + momentum 5/15min → fair_prob
#   3. near-cert   — best_bid ≥ 0.92 + ask ≤ 0.96 + < 2h restantes
#   4. scalp       — désactivé par défaut (off-policy actuellement)
#
# Sizing : fractional Kelly (1/4), cap 15% par trade. Stop daily DD
# à -20%. Cash floor 10%.

[run]
starting_cash = 100.0
mode = "edge"

[sizing]
max_position_ceiling_usd = 15.0
min_open_positions = 0
starter_trade_usd = 5.0
assumed_live_balance_usd = 0.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[execution]
pending_order_ttl_seconds = 60
min_sell_usd = 1.0

[persistence]
enabled = false

[edge]
max_hours = 4.0                         # ⚠ règle dure
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 150.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05                       # tight spread required for near-cert math
fee_pct = 0.02                          # estimation slippage + frais
min_edge_pct = 0.005                    # 0.5% edge min after fees (was 0.003 — too loose)
kelly_fraction = 0.25                   # 1/4 Kelly (sizing prudent)
max_position_pct = 0.15                 # 15% du capital par trade (=$15 sur $100)
max_orders_per_tick = 5                 # jusqu'à 4 entrées par tick
min_stake_usd = 2.0                     # plancher CLOB confortable
cash_floor_pct = 0.02
daily_drawdown_pct = 0.15               # halt si -15% sur la journée (=$15 sur $100)

# Exits — non-arb
take_profit_pct = 0.25
stop_loss_pct = 0.25
stop_loss_min_age_minutes = 3
tight_stop_hours = 1.0
tight_stop_pct = 0.15
very_tight_stop_hours = 0.5
very_tight_stop_pct = 0.10
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

# Lane arbitrage
arb_fee_buffer = 0.015                  # YES+NO < 0.985 = arb (loosened from 0.98)
arb_max_position_pct = 0.25             # arb autorise plus de capital

# Lane crypto directional
crypto_enabled = true                   # threshold/band markets only
crypto_direction_enabled = true         # "Up or Down" model re-enabled per user request
crypto_annual_vol = 0.60                # vol annualisée pour BTC/ETH
crypto_momentum_alpha = 4.0             # (legacy — only used if direction re-enabled)

# Lane near-certainty — math: edge = bid*bias - ask - fee_pct ≥ min_edge_pct
# With bias=1.04, fee=0.02, min_edge=0.005, the lane needs:
#   bid ≥ 0.80 AND ask ≤ bid*1.04 - 0.025 (i.e. spread ≤ ~3c at bid=0.80)
# Bumping min_bid from 0.55 → 0.80 concentrates the lane where math
# actually produces positive edge after fees.
near_cert_enabled = true
near_cert_max_hours = 4.0
near_cert_min_bid = 0.80                # was 0.55 — lane was negative-edge below 0.78
near_cert_max_ask = 0.96                # was 0.98 — 0.97+ resolves via resolved_exit
near_cert_bias_multiplier = 1.04        # was 1.06 — paired with min_bid bump

# Lane scalp (off par défaut — manque ordre limite + websocket)
scalp_enabled = false
scalp_min_volume_24h = 5000.0
scalp_max_position_pct = 0.05
scalp_tp_pct = 0.03
scalp_sl_pct = 0.05
scalp_max_age_minutes = 15

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15
