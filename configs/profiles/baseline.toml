# Profil baseline — référence défensive pour démarrer un dry-run.
#
# Pensé pour un opérateur qui découvre le bot. Le bot ne prend pas de
# pari sans signal smart-money clair : pas de noise fallback, pas de
# BTC edge. Filtres conservateurs.
#
# Pour pousser plus loin :
#   - aggressive.toml  : sizing +, noise ON, BTC ON
#   - live-90.toml     : config tournant en prod LIVE
#   - tight-filters.toml : version encore plus serrée pour A/B test
#
# Toutes les clés ci-dessous sont documentées dans docs/PROFILES.md.

[run]
starting_cash = 29.0

[sizing]
position_pct = 0.10
# Fix from baseline_tight audit: USD ceiling must not exceed pct ceiling
# (was $36.94 cap on a $29.55 bankroll → 125% of equity, single trade
# could wipe 13 winners). 30% × $29 = $8.70. The pct cap actually binds now.
max_position_ceiling_usd = 8.70
max_position_ceiling_pct = 0.30
max_trade_usd = 0.0                       # 0 = pas de cap absolu, c'est ceiling qui gouverne
high_conviction_balance_fraction = 0.30
cash_floor_pct = 0.02
min_open_positions = 3
starter_trade_usd = 2.0
assumed_live_balance_usd = 29.0            # live bankroll 2026-05-22 (dry race overrides to $10 via env)

[trader_cohort]
leaderboard_window = "WEEK"
top_n = 100
min_trader_pnl = 100.0
min_trader_volume = 200.0
min_trader_roi = 0.005
trade_fetch_concurrency = 16
trade_lookback_minutes = 240

[discovery]
scan_limit = 1000
soon_hours = 72
fresh_signal_bonus = 8.0
priority_category_bonus = 6.0

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 1000.0

[filters]
# LOOSENED 2026-05-22: live wasn't buying because 8000+ wallet trades scanned,
# only 4 matched market pool, all 4 rejected for spread/staleness/price-band.
# Widened to let edge-case signals through. Still 4h-only rule (memory: every
# strategy must restrict to markets expiring ≤4h).
min_consensus = 1
fallback_consensus = 1
min_copied_usdc = 1.0
min_trade_usd = 0.5
max_chase_premium = 0.30
price_min = 0.02
price_max = 0.98
max_absolute_spread = 0.15
max_relative_spread = 0.50
signal_staleness_seconds = 60             # env var en min — was 10min, raised to 60min so cohort signals don't go stale between ticks
min_hours_to_close = 0.5
max_hours_to_close = 4.0
max_orders_per_tick = 0                   # 0 = illimité (gouverné par cash floor)
max_sports_positions = 3
sports_score_penalty = 8.0

[crypto]
min_buy_price = 0.70
min_hours_to_close = 6.0
max_hours_to_close = 4.0
min_copied_usdc = 1000.0
min_consensus = 3
micro_min_consensus = 3
micro_max_entry_slippage = 0.05
micro_max_trade_usd = 5.0

[execution]
max_entry_slippage = 0.10
pending_order_ttl_seconds = 45
min_sell_usd = 1.0

[exits]
take_profit_ladder = "0.25:0.15,0.5:0.25,1.0:0.50,2.0:0.25,3.0:0.15"
trailing_stop_arm_pct = 0.25
trailing_stop_giveback = 0.50
peak_protect_arm_pct = 1.0
peak_protect_exit_pct = 0.40
stop_loss_pct = 0.40
stop_loss_min_age_minutes = 15
max_hold_hours = 24.0
near_expiry_min_profit = 0.05
near_expiry_minutes_to_close = 20
resolved_market_threshold = 0.97

[cohort_exit]
enabled = true
lookback_minutes = 120
min_age_minutes = 30
min_wallets = 2

[deep_fallback]
enabled = true
min_copied_usdc = 25.0                    # was 250 — too tight when 4 matched tokens have <250 USDC

[reverse_lookup]
enabled = true
max_tokens = 30
min_copied_usdc = 100.0
min_liquidity_usd = 200.0
min_volume_usd = 500.0

[btc_edge]
enabled = false
per_trade_cap_usd = 5.0
min_edge_over_market = 0.08
min_buy_price = 0.05
max_buy_price = 0.95
max_spread = 0.04
min_trade_usd = 1.0
min_model_probability = 0.90
min_hours_to_close = 0.5
volatility_days = 7

[noise_fallback]
# ENABLED 2026-05-22: when smart-money fires 0 trades AND cash pressure is
# high, take a small $1.50 micro-bet on the top-scored candidate. Capped at
# 2 trades/tick. Won't fire when smart-money already produced a signal.
enabled = true
max_trades_per_tick = 2
stake_usd = 1.50
cash_pressure_threshold = 0.35
min_buy_price = 0.15
max_buy_price = 0.85
max_spread = 0.06

[auto_tune]
enabled = true
min_closed_trades = 30

[persistence]
enabled = false                           # référence A/B sans filtre persistance

[telemetry]
quiet = false
auto_interval_seconds = 10
