# Baseline dry-run profile for filtered whale copy-trading.
#
# This is the default conservative baseline for both dry-run and live
# operator workflows. It mirrors a curated whale list, copies only large
# enough BUYs, caps per-trade sizing to bankroll percentage, and uses
# simple risk exits: partial profit at +50% / +100%, stop-loss, whale exit,
# and terminal-resolution exit at 0.99.
#
# Usage:
#   uv run pmbot auto-loop --profile baseline --dry-run --run baseline-a
#
# The target field accepts a CSV of usernames and/or 0x addresses.

[run]
starting_cash = 100.0
mode = "mirror"

[mirror]
target = """
bossoskil1,
0x492442EaB586F242B53bDa933fD5dE859c8A3782,
Pestle,
surfandturf,
JewishNinja,
swisstony,
RN1,
Oddn,
anoin123,
Talvez10,
wan123,
tdrhrhhd,
Supah9ga,
beachboy4,
Golgatha,
yaya88888,
frankfrankfrank,
influenz.eth,
kch123,
GamblingIsAllYouNeed,
DrPufferfish,
gmpm,
ImJustKen,
JustKen,
S-Works,
geniusMC,
Countryside,
LaBradfordSmith22,
SecondWindCapital
"""
size_usd = 2.0
copy_ratio = 0.20
max_position_pct = 0.02
max_open_positions = 8
max_category_exposure_pct = 0.20
whale_exit_fraction = 0.50
daily_loss_limit_pct = 0.05
stop_loss_pct = 0.35
stop_loss_min_age_minutes = 15
resolved_exit_threshold = 0.99
mirror_sells = true
min_target_stake_usd = 5000.0
max_chase_premium = 0.04
min_buy_price = 0.05
max_buy_price = 0.95
max_trade_age_seconds = 90

[exits]
take_profit_ladder = "0.5:0.25,1.0:0.50"
trailing_stop_arm_pct = 0.0
trailing_stop_giveback = 0.0
peak_protect_arm_pct = 0.0
peak_protect_exit_pct = 0.0
stop_loss_pct = 0.35
stop_loss_min_age_minutes = 15
max_hold_hours = 0.0
near_expiry_min_profit = 0.0
near_expiry_minutes_to_close = 0
resolved_market_threshold = 0.99

[execution]
min_sell_usd = 1.0

[telemetry]
quiet = false
auto_interval_seconds = 10
