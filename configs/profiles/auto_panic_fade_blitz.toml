# auto_panic_fade_blitz — derived from auto_buyer_fade_microcut
# Hypothesis: +15% winner uses 1.5h/TP5/SL3; if exit speed IS the edge, halving everything to 0.75h/TP3/SL2 should improve PnL/hour and dodge tail risk — if it underperforms, we've found the floor of the speed dimension
[run]
starting_cash = 29.55
mode = "panic_fade"

[sizing]
max_position_ceiling_usd = 2.96
min_open_positions = 0
starter_trade_usd = 1.77

[market_filters]
min_liquidity_usd = 600.0
min_volume_usd = 2500.0

[persistence]
enabled = false

[race]
max_hours = 0.75
scan_limit = 500
min_liquidity_usd = 1500.0
min_volume_24h_usd = 2500.0
min_price = 0.18
max_price = 0.78
max_spread = 0.02
stake_usd = 1.77
stake_pct = 0.06
max_orders_per_tick = 4
cash_floor_pct = 0.05
tp_pct = 0.03
sl_pct = 0.02
sl_min_age_minutes = 1
near_expiry_minutes = 2
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 60
stdout_heartbeat_minutes = 15