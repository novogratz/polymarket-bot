# Profil "weak_holder_flush_inverse" — inverse de #12 ; achète l'autre
# côté du dump (mom ≥ +10%, le côté qui rallie) — bet que le dump est
# justifié et continue.

[run]
starting_cash = 100.0
mode = "weak_holder_flush_inverse"

[sizing]
max_position_ceiling_usd = 15.0
min_open_positions = 0
starter_trade_usd = 5.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 5.0
stake_pct = 0.05
max_orders_per_tick = 3
cash_floor_pct = 0.10
tp_pct = 0.25
sl_pct = 0.25
sl_min_age_minutes = 5
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15
