# Profil "late_favorite" — favoris dans les 30 dernières min avant expiry.
#
# Pur "resolution edge" play. La recherche en marchés de prédiction
# montre que les favoris dans les dernières minutes résolvent à des taux
# très élevés. Question empirique : est-ce qu'on capture cet edge après
# spread + tick size de Polymarket ?

[run]
starting_cash = 100.0
mode = "late_favorite"

[sizing]
max_position_ceiling_usd = 15.0
min_open_positions = 0
starter_trade_usd = 5.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 5.0
stake_pct = 0.15
max_orders_per_tick = 5
cash_floor_pct = 0.10
tp_pct = 0.25                           # TP très serré — favoris bougent peu
sl_pct = 0.25
sl_min_age_minutes = 3
near_expiry_minutes = 5
resolved_exit_threshold = 0.97
contrarian_min_momentum = 0.03
favorite_min_bid = 0.65
breakout_min_momentum = 0.05
breakout_min_volume = 5000.0
late_favorite_min_bid = 0.75            # favori très net
late_favorite_max_hours = 0.5           # < 30 min restantes seulement

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15
