# auto_resolution_compression_clock — new lane, no parent in auto_ list yet
# Hypothesis: resolution_compression rides last-mile odds tightening as expiry nears; with 4h-only universe this should fire frequently. Wide TP 25% / tight SL 9% to capture compression asymmetry without overstaying.
[run]
starting_cash = 20.0
mode = "resolution_compression"

[sizing]
max_position_ceiling_usd = 3.5
min_open_positions = 0
starter_trade_usd = 1.8

[market_filters]
min_liquidity_usd = 250.0
min_volume_usd = 600.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 700.0
min_volume_24h_usd = 600.0
min_price = 0.06
max_price = 0.94
max_spread = 0.06
stake_usd = 1.8
stake_pct = 0.09
max_orders_per_tick = 4
cash_floor_pct = 0.05
tp_pct = 0.25
sl_pct = 0.09
sl_min_age_minutes = 2
near_expiry_minutes = 3
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 120
stdout_heartbeat_minutes = 15