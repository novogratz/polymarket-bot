# auto_panic_cont_blitz_size — derived from momentum_panic_continuation
# Hypothesis: panic-continuation winners resolve fast; push stake_pct 0.25→0.35 AND shrink sl_min_age 4→2 to capture the move or bail before it inverts.
[run]
starting_cash = 20.0
mode = "pmlepgm_counter_panic_fade"

[sizing]
max_position_ceiling_usd = 18.0
min_open_positions = 0
starter_trade_usd = 6.0

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 8.0
stake_pct = 0.35
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.30
sl_pct = 0.20
sl_min_age_minutes = 2
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 70
stdout_heartbeat_minutes = 30