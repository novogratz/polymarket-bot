# auto_championdumonde_blade — derived from claude_baseline_fresh
# Hypothesis: championdumonde_breakout mode has never been deployed in race; if breakout-detection alpha exists, a tight 0.5h race with 4% TP / 3% SL on a 0.20-0.80 mid-band should catch fast post-breakout drift before mean reversion kills it — distinct hypothesis from late_momentum_chase (entry timing earlier)
[run]
starting_cash = 100.0
mode = "championdumonde_breakout"

[sizing]
max_position_ceiling_usd = 2.5
min_open_positions = 0
starter_trade_usd = 1.5

[market_filters]
min_liquidity_usd = 1000.0
min_volume_usd = 2500.0

[persistence]
enabled = false

[race]
max_hours = 0.5
scan_limit = 500
min_liquidity_usd = 2000.0
min_volume_24h_usd = 3000.0
min_price = 0.20
max_price = 0.80
max_spread = 0.02
stake_usd = 1.5
stake_pct = 0.07
max_orders_per_tick = 4
cash_floor_pct = 0.05
tp_pct = 0.04
sl_pct = 0.03
sl_min_age_minutes = 1
near_expiry_minutes = 2
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 55
stdout_heartbeat_minutes = 15