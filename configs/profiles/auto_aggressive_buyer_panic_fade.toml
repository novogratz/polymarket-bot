# auto_aggressive_buyer_panic_fade — derived from aggressive_buyer_detection
# Hypothesis: aggressive_buyer_detection is the worst-bleeding lane (-88%, -80% across two variants); fade it with panic_fade mode, mid-strict liquidity, 8% TP / 5% SL — bet that the buyers everyone is chasing are tops, not bottoms
[run]
starting_cash = 20.0
mode = "panic_fade"

[sizing]
max_position_ceiling_usd = 3.5
min_open_positions = 0
starter_trade_usd = 2.0

[market_filters]
min_liquidity_usd = 400.0
min_volume_usd = 1500.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 1000.0
min_volume_24h_usd = 1000.0
min_price = 0.10
max_price = 0.85
max_spread = 0.04
stake_usd = 2.0
stake_pct = 0.02
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.08
sl_pct = 0.05
sl_min_age_minutes = 2
near_expiry_minutes = 4
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 135
stdout_heartbeat_minutes = 15