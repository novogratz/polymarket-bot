# Profil "kzerlepgm_ultimatestrategy" — structural YES/NO complement arbitrage.
#
# Detects when (ask_YES + ask_NO) < 1.00 on binary markets expiring within
# 4h and locks in the spread. Fractional Kelly sizing (¼ Kelly) capped by
# the per-tick stake.
#
# DRY-RUN ONLY at this stage. Live execution is intentionally not wired
# in until the dry-run results validate the scanner; matches the spec's
# own guidance: "Start Small: Paper trade → scale only after proven stats."

[run]
starting_cash = 20.0
mode = "kzerlepgm_ultimatestrategy"

[sizing]
max_position_ceiling_usd = 10.0
min_open_positions = 0
starter_trade_usd = 5.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 200.0
min_volume_24h_usd = 100.0
min_price = 0.05
max_price = 0.95
max_spread = 0.10
stake_usd = 5.0
max_orders_per_tick = 5
cash_floor_pct = 0.10
tp_pct = 0.95
sl_pct = 0.99
sl_min_age_minutes = 5
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15
