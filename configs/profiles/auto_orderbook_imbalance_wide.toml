# auto_orderbook_imbalance_wide — derived from auto_orderbook_imbalance_micro
# Hypothesis: micro variant uses tight stake; widen size + push SL to 9% / TP to 16% to test whether orderbook imbalance signal needs more room to play out vs. micro-cutting on noise
[run]
starting_cash = 100.0
mode = "orderbook_imbalance"

[sizing]
max_position_ceiling_usd = 5.0
min_open_positions = 0
starter_trade_usd = 3.0

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 1200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 1500.0
min_volume_24h_usd = 1500.0
min_price = 0.15
max_price = 0.85
max_spread = 0.04
stake_usd = 3.0
stake_pct = 0.15
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.16
sl_pct = 0.09
sl_min_age_minutes = 2
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 105
stdout_heartbeat_minutes = 15