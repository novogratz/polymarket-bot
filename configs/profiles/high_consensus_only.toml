# high_consensus_only — only follow very strong cohort signals
#
# Thesis: weak cohort signals are noise (2 wallets, $10 copied = nothing).
# Strong cohort signals (4+ wallets, $1k+ copied, all aligned within 30min)
# are the only ones with real informational edge. This profile waits for
# only those, ignores everything else. Trades RARELY but each trade is
# higher quality.
#
# Risk: may go hours/days without a trade. Boring but defensive.

[run]
starting_cash = 10.0

[sizing]
position_pct = 0.20
max_position_ceiling_usd = 4.0
max_position_ceiling_pct = 0.40
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.40
cash_floor_pct = 0.05
min_open_positions = 2
starter_trade_usd = 3.0
assumed_live_balance_usd = 10.0

[trader_cohort]
leaderboard_window = "MONTH"             # MONTH = more conservative leaderboard
top_n = 50
min_trader_pnl = 1000.0
min_trader_volume = 2000.0
min_trader_roi = 0.05
trade_fetch_concurrency = 16
trade_lookback_minutes = 120

[discovery]
scan_limit = 1000
soon_hours = 24
fresh_signal_bonus = 12.0
priority_category_bonus = 8.0

[market_filters]
min_liquidity_usd = 2000.0
min_volume_usd = 5000.0

[filters]
# Very strict: 4+ wallets, $1k+ copied, fresh, narrow price band
min_consensus = 3
fallback_consensus = 3
min_copied_usdc = 300.0
min_trade_usd = 2.0
max_chase_premium = 0.10
price_min = 0.10
price_max = 0.90
max_absolute_spread = 0.06
max_relative_spread = 0.20
signal_staleness_seconds = 60
min_hours_to_close = 0.5
max_hours_to_close = 4.0
max_orders_per_tick = 0
max_sports_positions = 2
sports_score_penalty = 5.0

[crypto]
min_buy_price = 0.10
min_hours_to_close = 0.5
max_hours_to_close = 4.0
min_copied_usdc = 500.0
min_consensus = 3
micro_min_consensus = 3
micro_max_entry_slippage = 0.03
micro_max_trade_usd = 4.0

[execution]
max_entry_slippage = 0.05
pending_order_ttl_seconds = 60
min_sell_usd = 0.5

[exits]
take_profit_ladder = "0.25:0.20,0.50:0.30,1.0:0.50"
trailing_stop_arm_pct = 0.20
trailing_stop_giveback = 0.40
peak_protect_arm_pct = 0.50
peak_protect_exit_pct = 0.25
stop_loss_pct = 0.30
stop_loss_min_age_minutes = 10
max_hold_hours = 4.0
near_expiry_min_profit = 0.05
near_expiry_minutes_to_close = 20
resolved_market_threshold = 0.97

[cohort_exit]
enabled = true
lookback_minutes = 60
min_age_minutes = 15
min_wallets = 2

[deep_fallback]
enabled = false                          # strict-only — no relaxed scans

[reverse_lookup]
enabled = false

[btc_edge]
enabled = false
per_trade_cap_usd = 5.0
min_edge_over_market = 0.08
min_buy_price = 0.05
max_buy_price = 0.95
max_spread = 0.04
min_trade_usd = 1.0
min_model_probability = 0.90
min_hours_to_close = 0.5
volatility_days = 7

[noise_fallback]
enabled = false
max_trades_per_tick = 2
stake_usd = 1.50
cash_pressure_threshold = 0.35
min_buy_price = 0.20
max_buy_price = 0.80
max_spread = 0.04

[auto_tune]
enabled = false

[persistence]
enabled = false

[telemetry]
quiet = false
auto_interval_seconds = 10
