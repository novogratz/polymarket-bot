# Profil "panic_fade" — fade emotional overreaction.
#
# Inspiré de microstructure HFT (panic fade thesis) : les marchés
# peu liquides sur-réagissent quand le flux émotionnel domine. Notre
# version polling-based fade les moves extrêmes (≥15% intraday) confirmés
# par volume. Pas de websocket : on capture l'overreaction macro pas
# micro, mais le thesis est le même.

[run]
starting_cash = 42.43
mode = "panic_fade"

[sizing]
max_position_ceiling_usd = 15.0
min_open_positions = 0
starter_trade_usd = 5.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 5.0
stake_pct = 0.15
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.25                           # TP serré: scalp post-panic
sl_pct = 0.25
sl_min_age_minutes = 3
near_expiry_minutes = 5
resolved_exit_threshold = 0.97
contrarian_min_momentum = 0.03
favorite_min_bid = 0.65
breakout_min_momentum = 0.05
breakout_min_volume = 5000.0
late_favorite_min_bid = 0.65
late_favorite_max_hours = 1.5
panic_fade_min_move = 0.15              # ≥15¢ panic move
panic_fade_min_volume = 3000.0          # volume confirmant la panic
underdog_max_ask = 0.30
underdog_min_momentum = 0.03
underdog_min_volume = 2000.0

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15
