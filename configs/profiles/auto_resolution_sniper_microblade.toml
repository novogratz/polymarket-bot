# auto_resolution_sniper_microblade — derived from claude_resolution_sniper
# Hypothesis: race-wide problem is unrealized positions dragging equity, not entry quality; deploy claude_resolution_sniper (resolution-focused mode never auto-spawned) with micro ceiling (1.5 stake, 2.0 max) + 1h race + 2-min near-expiry to force mechanical realization on every entry
[run]
starting_cash = 100.0
mode = "claude_resolution_sniper"

[sizing]
max_position_ceiling_usd = 2.0
min_open_positions = 0
starter_trade_usd = 1.5

[market_filters]
min_liquidity_usd = 800.0
min_volume_usd = 2000.0

[persistence]
enabled = false

[race]
max_hours = 1.0
scan_limit = 500
min_liquidity_usd = 2000.0
min_volume_24h_usd = 2500.0
min_price = 0.15
max_price = 0.85
max_spread = 0.025
stake_usd = 1.5
stake_pct = 0.05
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.08
sl_pct = 0.05
sl_min_age_minutes = 1
near_expiry_minutes = 2
resolved_exit_threshold = 0.95

[telemetry]
quiet = true
auto_interval_seconds = 70
stdout_heartbeat_minutes = 15