# auto_aggressive_buyer_disciplined — derived from aggressive_buyer_detection
# Hypothesis: aggressive_buyer_detection at -87% (n=0) isn't worse than baseline — the signal may have edge, but loose 25% SL lets losers compound; force discipline with 8% SL + 12% TP to capture the asymmetric early-momentum edge if it exists
[run]
starting_cash = 29.55
mode = "aggressive_buyer_detection"

[sizing]
max_position_ceiling_usd = 8.87
min_open_positions = 0
starter_trade_usd = 4.43

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 500.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 800.0
min_volume_24h_usd = 500.0
min_price = 0.10
max_price = 0.90
max_spread = 0.04
stake_usd = 4.43
stake_pct = 0.08
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.12
sl_pct = 0.08
sl_min_age_minutes = 1
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 60
stdout_heartbeat_minutes = 15