# auto_whale_solo_sniper — derived from whale_entry_detection
# Hypothesis: cohort-consensus strategies are over-represented (6/10 running); test the opposite — single-whale BUY of $1k+ on a fresh token, fast TP at +15%, tight SL at -10%, exploit the 1-2 min window before the rest of the cohort piles in
[run]
starting_cash = 20.0
mode = "whale_entry_detection"

[sizing]
max_position_ceiling_usd = 4.0
min_open_positions = 0
starter_trade_usd = 2.0

[market_filters]
min_liquidity_usd = 400.0
min_volume_usd = 1000.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 1000.0
min_volume_24h_usd = 1500.0
min_price = 0.08
max_price = 0.92
max_spread = 0.04
stake_usd = 2.0
stake_pct = 0.10
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.15
sl_pct = 0.10
sl_min_age_minutes = 1
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 45
stdout_heartbeat_minutes = 15