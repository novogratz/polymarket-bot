# auto_momentum_exhaustion_micro — derived from auto_mean_reversion_fade_micro
# Hypothesis: aggressive_buyer loses -87% so its inverse should win; mean_reversion_fade is one inverse path, momentum_exhaustion_reversal is another — different mode reading same exhaustion signal; if both inverse modes work, the edge is the fade itself, not a particular mode's heuristic
[run]
starting_cash = 20.0
mode = "momentum_exhaustion_reversal"

[sizing]
max_position_ceiling_usd = 2.0
min_open_positions = 0
starter_trade_usd = 1.0

[market_filters]
min_liquidity_usd = 600.0
min_volume_usd = 2000.0

[persistence]
enabled = false

[race]
max_hours = 1.5
scan_limit = 500
min_liquidity_usd = 1500.0
min_volume_24h_usd = 2000.0
min_price = 0.20
max_price = 0.80
max_spread = 0.025
stake_usd = 1.0
stake_pct = 0.05
max_orders_per_tick = 2
tp_pct = 0.06
sl_pct = 0.04
cash_floor_pct = 0.05
sl_min_age_minutes = 1
near_expiry_minutes = 3
resolved_exit_threshold = 0.96

[telemetry]
quiet = true
auto_interval_seconds = 160
stdout_heartbeat_minutes = 15