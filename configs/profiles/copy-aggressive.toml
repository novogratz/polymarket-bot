# Aggressive whale-copy profile — bigger sizing, looser filters, faster exits.
#
# Multi-wallet mirror with looser entry filters than copy-advanced.
# Variance is higher; expect deeper drawdowns.
#
# Usage:
#   uv run pmbot auto-loop --profile copy-aggressive --dry-run --run yolo
#   uv run pmbot auto-loop --profile copy-aggressive --live
#
# Schema-supported [mirror] keys only. Orphan keys from an older
# extended mirror schema were stripped during the test-suite cleanup
# (the runtime never read them).

[run]
starting_cash = 29.55
mode = "mirror"

[mirror]
target = "bossoskil1, Pestle, surfandturf, JewishNinja, swisstony, RN1, Oddn, anoin123, wan123, Talvez10"

# Sizing — significantly larger stakes per trade.
size_usd = 750.0

# Filters — looser. Smaller whale stakes count, looser price band, more
# headroom to chase, longer trade-age window.
min_target_stake_usd = 50.0
max_chase_premium = 0.08
min_buy_price = 0.15
max_buy_price = 0.85
max_trade_age_seconds = 3600
mirror_sells = true

[exits]
# TP ladder pulled in: lock partials sooner so the bigger stakes don't
# round-trip on volatile markets.
take_profit_ladder = "0.15:0.20,0.30:0.30,0.60:0.40,1.0:0.50,2.0:0.30"
trailing_stop_arm_pct = 0.20
trailing_stop_giveback = 0.50
peak_protect_arm_pct = 0.80
peak_protect_exit_pct = 0.35
stop_loss_pct = 0.20
stop_loss_min_age_minutes = 10
max_hold_hours = 12

[persistence]
enabled = false

[telemetry]
quiet = false
auto_interval_seconds = 30
