# Profil "whale_entry_detection" — #2 — outsized volume + positive momentum (whale-trade proxy).

[run]
starting_cash = 14.0
mode = "whale_entry_detection"

[sizing]
max_position_ceiling_usd = 3.0                  # scaled for $14 bankroll
min_open_positions = 2
starter_trade_usd = 1.5
assumed_live_balance_usd = 14.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 1.5                                  # scaled for $14
stake_pct = 0.10                                 # 10% per trade
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.25
sl_pct = 0.25
sl_min_age_minutes = 3
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15
