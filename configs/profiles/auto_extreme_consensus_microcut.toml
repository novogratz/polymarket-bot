# auto_extreme_consensus_microcut — derived from auto_extreme_consensus_fast_cut
# Hypothesis: fast_cut at 1.5h/TP10/SL6 is the best consensus variant (-6%); compress to 1h max with TP 7% / SL 4% and 1c spread cap to test whether the 1.5h-to-1h window holds any further edge or if even 1h is too long for the extreme-consensus signal
[run]
starting_cash = 20.0
mode = "claude_extreme_consensus"

[sizing]
max_position_ceiling_usd = 3.0
min_open_positions = 0
starter_trade_usd = 1.8

[market_filters]
min_liquidity_usd = 1500.0
min_volume_usd = 4000.0

[persistence]
enabled = false

[race]
max_hours = 1.0
scan_limit = 500
min_liquidity_usd = 4000.0
min_volume_24h_usd = 6000.0
min_price = 0.25
max_price = 0.75
max_spread = 0.01
stake_usd = 1.8
stake_pct = 0.09
max_orders_per_tick = 2
cash_floor_pct = 0.05
tp_pct = 0.07
sl_pct = 0.04
sl_min_age_minutes = 1
near_expiry_minutes = 3
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 75
stdout_heartbeat_minutes = 15