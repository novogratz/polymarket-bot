# Profil mirror — copy-trade multi-wallets.
#
# Liste agrégée résolue via DataApiClient.leaderboard (multi catégories × périodes).
# Usage :
#   uv run pmbot auto-loop --profile copy-0x4924 --dry-run --run mirror-pool
#
# Pour ajouter/retirer un wallet : éditer la liste `target` (CSV).
# Pour changer le sizing : `size_usd` (cap par BUY mirroré).

[run]
starting_cash = 42.43
mode = "mirror"

[mirror]
