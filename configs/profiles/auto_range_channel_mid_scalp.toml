# auto_range_channel_mid_scalp — derived from auto_panic_fade_mid
# Hypothesis: range_channel_trading mode untested in race; mid-band 0.42-0.58 with ultra-tight 1.5c spread + 4% TP captures range oscillation distinct from panic_fade (which fires only on shocks) — tests whether quiet markets have exploitable channel structure when panic_fade has nothing to fade
[run]
starting_cash = 100.0
mode = "range_channel_trading"

[sizing]
max_position_ceiling_usd = 2.0
min_open_positions = 0
starter_trade_usd = 1.2

[market_filters]
min_liquidity_usd = 1500.0
min_volume_usd = 3000.0

[persistence]
enabled = false

[race]
max_hours = 2.0
scan_limit = 500
min_liquidity_usd = 2500.0
min_volume_24h_usd = 3500.0
min_price = 0.42
max_price = 0.58
max_spread = 0.015
stake_usd = 1.2
stake_pct = 0.06
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.04
sl_pct = 0.025
sl_min_age_minutes = 2
near_expiry_minutes = 4
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 95
stdout_heartbeat_minutes = 15