# auto_liq_vacuum_breakout_loose — derived from auto_liq_vacuum_breakout
# Hypothesis: drop min_liquidity_usd 400→200 and min_volume 800→400 to actually enter; keep wide TP, tighter SL (-10%) since looser entries deserve faster cuts
[run]
starting_cash = 20.0
mode = "liquidity_vacuum_breakout"

[sizing]
max_position_ceiling_usd = 3.0
min_open_positions = 0
starter_trade_usd = 1.5

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 300.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 200.0
min_volume_24h_usd = 400.0
min_price = 0.05
max_price = 0.95
max_spread = 0.07
stake_usd = 1.5
stake_pct = 0.07
max_orders_per_tick = 4
cash_floor_pct = 0.05
tp_pct = 0.22
sl_pct = 0.10
sl_min_age_minutes = 2
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 60
stdout_heartbeat_minutes = 15