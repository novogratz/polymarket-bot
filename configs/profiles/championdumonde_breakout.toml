# Profil "championdumonde_breakout" — momentum continuation avec confirmation de volume.
#
# Version plus stricte de news : nécessite à la fois un fort mouvement
# de prix intraday ET un volume élevé. Filtre les "fake spikes" où un
# whale pousse un orderbook illiquide.

[run]
starting_cash = 100.0
mode = "championdumonde_breakout"

[sizing]
max_position_ceiling_usd = 10.0
min_open_positions = 0
starter_trade_usd = 5.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 5.0
max_orders_per_tick = 3
cash_floor_pct = 0.10
tp_pct = 0.25
sl_pct = 0.40
sl_min_age_minutes = 5
near_expiry_minutes = 5
resolved_exit_threshold = 0.97
contrarian_min_momentum = 0.03
favorite_min_bid = 0.65
breakout_min_momentum = 0.05            # ≥5¢ intraday move
breakout_min_volume = 5000.0            # ≥$5k of total volume on the market
late_favorite_min_bid = 0.75
late_favorite_max_hours = 0.5

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15
