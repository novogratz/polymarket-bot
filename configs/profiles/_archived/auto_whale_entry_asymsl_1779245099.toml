# auto_whale_entry_asymsl — derived from whale_entry_detection
# Hypothesis: parent's 75% wr on n=4 means losses are rare; pair that with asymmetric R:R — tight SL 0.18 + extended TP 0.45 — so the 25% losses cost less and the 75% wins capture more. None of 8 whale_* variants combines tight-SL + let-run-TP.
[run]
starting_cash = 20.0
mode = "whale_entry_detection"

[sizing]
max_position_ceiling_usd = 15.0
min_open_positions = 0
starter_trade_usd = 5.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 5.0
stake_pct = 0.18
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.45
sl_pct = 0.18
sl_min_age_minutes = 4
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 70
stdout_heartbeat_minutes = 15