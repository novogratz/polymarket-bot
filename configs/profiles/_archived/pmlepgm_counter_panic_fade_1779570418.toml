# Profil "pmlepgm_counter_panic_fade" — reverse trade of panic_fade.
#
# Même déclencheur que panic_fade (move ≥15¢ confirmé par volume) mais
# parie AVEC le mouvement (côté gagnant) au lieu de le fader. Thèse :
# une partie des panic moves continuent jusqu'à la résolution.

[run]
starting_cash = 20.0
mode = "pmlepgm_counter_panic_fade"

[sizing]
max_position_ceiling_usd = 3.0
min_open_positions = 4
starter_trade_usd = 1.5

position_pct = 0.10
max_position_ceiling_pct = 0.15
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.20
cash_floor_pct = 0.10
assumed_live_balance_usd = 20.0
[market_filters]
min_liquidity_usd = 300.0
min_volume_usd = 300.0

[persistence]
enabled = false

[race]
max_hours = 48.0
scan_limit = 750
min_liquidity_usd = 300.0
min_volume_24h_usd = 150.0
min_price = 0.08
max_price = 0.92
max_spread = 0.06
stake_usd = 1.5
stake_pct = 0.075
max_orders_per_tick = 3
cash_floor_pct = 0.10
tp_pct = 0.25
sl_pct = 0.25
sl_min_age_minutes = 10
near_expiry_minutes = 45
resolved_exit_threshold = 0.97
contrarian_min_momentum = 0.03
favorite_min_bid = 0.65
breakout_min_momentum = 0.05
breakout_min_volume = 5000.0
late_favorite_min_bid = 0.65
late_favorite_max_hours = 1.5
panic_fade_min_move = 0.05
panic_fade_min_volume = 150.0
underdog_max_ask = 0.30
underdog_min_momentum = 0.03
underdog_min_volume = 2000.0

[telemetry]
quiet = false
auto_interval_seconds = 300
stdout_heartbeat_minutes = 15

[discovery]
soon_hours = 48

[filters]
max_hours_to_close = 48.0
max_orders_per_tick = 3
min_trade_usd = 1.0
max_absolute_spread = 0.06
max_relative_spread = 0.35
max_chase_premium = 0.12

[crypto]
max_hours_to_close = 48.0

[execution]
max_entry_slippage = 0.06

[exits]
stop_loss_pct = 0.25
stop_loss_min_age_minutes = 10
max_hold_hours = 24.0
near_expiry_exit_losers = true
near_expiry_loser_minutes = 45

[noise_fallback]
enabled = false

[news]
min_liquidity_usd = 300.0
min_volume_24h_usd = 150.0
max_spread = 0.06
stake_usd = 1.5
max_stake_usd = 1.5
max_orders_per_tick = 3

[edge]
min_liquidity_usd = 300.0
min_volume_24h_usd = 150.0
max_spread = 0.06
max_position_pct = 0.075
max_orders_per_tick = 3
