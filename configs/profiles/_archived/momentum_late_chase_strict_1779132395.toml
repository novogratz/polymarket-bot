# momentum_late_chase_strict — late_momentum_chase + fast SL exit
# Thesis: chase late moves only with tight risk; cut if it doesn't continue
[run]
starting_cash = 100.0
mode = "late_momentum_chase"

[sizing]
max_position_ceiling_usd = 8.0
min_open_positions = 0
starter_trade_usd = 4.0

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 4.0
stake_pct = 0.15
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.20
sl_pct = 0.12
sl_min_age_minutes = 2
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 60
stdout_heartbeat_minutes = 30
