# Profil "kzerlepgm_ultimatestrategy" — repurposed as endgame-sweep clone.
#
# Was a YES/NO arb scanner (live never wired; arbs eaten in milliseconds
# by faster bots). Now runs the same selector as claude_endgame_sweep
# but tracks under its own ledger: bid 0.92-0.985 + ask ≤0.95 + ≤2h +
# spread ≤1¢ + vol ≥$500.

[run]
starting_cash = 20.0
mode = "kzerlepgm_ultimatestrategy"

[sizing]
max_position_ceiling_usd = 15.0
min_open_positions = 0
starter_trade_usd = 5.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 5.0
stake_pct = 0.15
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.25
sl_pct = 0.10                            # SL serré (clone d'endgame)
sl_min_age_minutes = 3
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15
