# auto_panic_cont_tightsl — derived from momentum_panic_continuation
# Hypothesis: panic-continuation thesis has tight TP 0.35, but SL 0.25 still gives back too much when the fade rejects. Cut SL to 0.15 and lift TP to 0.50 — keep winners, kill losers fast.
[run]
starting_cash = 20.0
mode = "pmlepgm_counter_panic_fade"

[sizing]
max_position_ceiling_usd = 15.0
min_open_positions = 0
starter_trade_usd = 6.0

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 8.0
stake_pct = 0.25
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.50
sl_pct = 0.15
sl_min_age_minutes = 3
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 95
stdout_heartbeat_minutes = 15