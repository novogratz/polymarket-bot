# auto_buyer_fade_quality_strict — derived from auto_buyer_fade_microcut
# Hypothesis: parent's tight-cut wins on $600liq/$2.5k vol — bump to $2k liq / $6k vol and shrink price band to 0.25-0.70 to test if the edge is "fade large noisy piles" rather than "fade everything fast"; trade count drops but win rate should jump
[run]
starting_cash = 20.0
mode = "panic_fade"

[sizing]
max_position_ceiling_usd = 2.5
min_open_positions = 0
starter_trade_usd = 1.5

[market_filters]
min_liquidity_usd = 2000.0
min_volume_usd = 6000.0

[persistence]
enabled = false

[race]
max_hours = 1.5
scan_limit = 500
min_liquidity_usd = 3000.0
min_volume_24h_usd = 5000.0
min_price = 0.25
max_price = 0.70
max_spread = 0.015
stake_usd = 2.0
stake_pct = 0.10
max_orders_per_tick = 2
cash_floor_pct = 0.05
tp_pct = 0.05
sl_pct = 0.03
sl_min_age_minutes = 1
near_expiry_minutes = 3
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 130
stdout_heartbeat_minutes = 15