# auto_mombreak_bigsize_earlylock — derived from momentum_breakout_aggressive
# Hypothesis: parent works at stake 0.25 / TP 0.50 / SL 0.35. Push stake to 0.30 (more
# variance per win) but pull TP down to 0.40 to lock earlier — testing whether the
# +7.7% edge comes from "ride breakouts" or from "any race entry with tight enough lock".

[run]
starting_cash = 20.0
mode = "championdumonde_breakout"

[sizing]
max_position_ceiling_usd = 18.0
min_open_positions = 0
starter_trade_usd = 6.0

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 10.0
stake_pct = 0.30
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.40
sl_pct = 0.30
sl_min_age_minutes = 4
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 55
stdout_heartbeat_minutes = 15