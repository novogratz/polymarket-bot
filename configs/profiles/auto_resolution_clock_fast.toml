# auto_resolution_clock_fast — derived from claude_resolution_clock
# Hypothesis: field has 0 closed trades after multiple cycles — entries sit too long without resolving; force resolution_clock mode with 90-min max_hours and aggressive near-expiry exit at 3 min to mechanically convert mark-to-market into realized PnL
[run]
starting_cash = 29.55
mode = "claude_resolution_clock"

[sizing]
max_position_ceiling_usd = 5.91
min_open_positions = 0
starter_trade_usd = 2.96

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 1500.0

[persistence]
enabled = false

[race]
max_hours = 1.5
scan_limit = 500
min_liquidity_usd = 1500.0
min_volume_24h_usd = 2000.0
min_price = 0.12
max_price = 0.88
max_spread = 0.04
stake_usd = 2.96
stake_pct = 0.04
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.12
sl_pct = 0.08
sl_min_age_minutes = 1
near_expiry_minutes = 3
resolved_exit_threshold = 0.95

[telemetry]
quiet = true
auto_interval_seconds = 50
stdout_heartbeat_minutes = 15