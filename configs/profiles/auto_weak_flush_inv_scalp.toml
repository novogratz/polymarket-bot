# auto_weak_flush_inv_scalp — derived from weak_holder_flush_inverse
# Hypothesis: weak_holder_flush_inverse was a historical dry winner per CLAUDE.md but no current auto_ uses it; test a fast-scalp variant (8% TP, 5% SL, 90s min hold) to capture the brief reversal pop without bleeding into the full 4h window
[run]
starting_cash = 20.0
mode = "weak_holder_flush_inverse"

[sizing]
max_position_ceiling_usd = 5.0
min_open_positions = 0
starter_trade_usd = 2.5

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 500.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 700.0
min_volume_24h_usd = 400.0
min_price = 0.06
max_price = 0.94
max_spread = 0.05
stake_usd = 2.5
stake_pct = 0.06
max_orders_per_tick = 3
cash_floor_pct = 0.04
tp_pct = 0.08
sl_pct = 0.05
sl_min_age_minutes = 1
near_expiry_minutes = 4
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 90
stdout_heartbeat_minutes = 15