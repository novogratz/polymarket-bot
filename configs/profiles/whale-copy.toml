# Whale Copy Strategy — copy trades from specific known high-volume traders.
#
# This strategy:
#   - Targets a hardcoded list of known active/profitable traders (whales)
#   - Does NOT require multi-wallet consensus (single whale = signal)
#   - Uses VERY short lookback window to catch only fresh trades
#   - Skips leaderboard scanning and persistence filters entirely
#
# Suitable for dry-run testing of "follow the whales" hypothesis.

[run]
starting_cash = 100.0

[sizing]
position_pct = 0.10
max_position_ceiling_usd = 25.0
max_position_ceiling_pct = 0.30
max_trade_usd = 5.0
high_conviction_balance_fraction = 0.20
cash_floor_pct = 0.05
min_open_positions = 5
starter_trade_usd = 2.0
assumed_live_balance_usd = 0.0

[trader_cohort]
leaderboard_window = "DAY"
top_n = 50
min_trader_pnl = 0.0
min_trader_volume = 0.0
min_trader_roi = 0.0
trade_fetch_concurrency = 16
trade_lookback_minutes = 15

whale_usernames = """
bossoskil1,
swisstony,
RN1,
jdsahgf,
surfandturf,
Pestle,
JewishNinja,
everydaymortgage,
yaya88888,
