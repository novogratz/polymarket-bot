# auto_mombreak_letrun — derived from momentum_breakout_aggressive
# Hypothesis: TP 0.50 closes winners too early on championdumonde breakouts — push TP to 0.85 and let runners ride; SL/stake/exit-age unchanged so we isolate the TP knob.
[run]
starting_cash = 29.55
mode = "championdumonde_breakout"

[sizing]
max_position_ceiling_usd = 22.16
min_open_positions = 0
starter_trade_usd = 7.39

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 11.82
stake_pct = 0.25
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.85
sl_pct = 0.35
sl_min_age_minutes = 5
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 55
stdout_heartbeat_minutes = 15