# auto_extreme_consensus_rip — derived from auto_extreme_consensus_patient
# Hypothesis: strict 6+ wallet entry IS edge but slow exits convert wins to losses; same entry filter, force 5% TP / 3% SL / 1-min min-hold to lock realized turnover and verify the entry signal is real
[run]
starting_cash = 100.0
mode = "claude_extreme_consensus"

[sizing]
max_position_ceiling_usd = 3.0
min_open_positions = 0
starter_trade_usd = 2.0

[market_filters]
min_liquidity_usd = 800.0
min_volume_usd = 2000.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 2000.0
min_volume_24h_usd = 1500.0
min_price = 0.08
max_price = 0.92
max_spread = 0.025
stake_usd = 2.0
stake_pct = 0.02
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.05
sl_pct = 0.03
sl_min_age_minutes = 1
near_expiry_minutes = 3
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 75
stdout_heartbeat_minutes = 15