# auto_momentum_exhaustion_fade — derived from aggressive_buyer_detection (inverse hypothesis)
# Hypothesis: aggressive_buyer at -87% chases late pumps; momentum_exhaustion_reversal fades those exact pumps. Tight 8% SL + 14% TP keeps asymmetry positive if fade-edge is real.
[run]
starting_cash = 20.0
mode = "momentum_exhaustion_reversal"

[sizing]
max_position_ceiling_usd = 4.0
min_open_positions = 0
starter_trade_usd = 2.0

[market_filters]
min_liquidity_usd = 300.0
min_volume_usd = 800.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 1000.0
min_volume_24h_usd = 800.0
min_price = 0.12
max_price = 0.88
max_spread = 0.05
stake_usd = 2.0
stake_pct = 0.10
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.14
sl_pct = 0.08
sl_min_age_minutes = 2
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 75
stdout_heartbeat_minutes = 15