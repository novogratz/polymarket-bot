# momentum_early_letrun — early_momentum_detection + +100% TP / no early cut
# Thesis: early signal but high-conviction sizing, ride the asymmetric tail
[run]
starting_cash = 100.0
mode = "early_momentum_detection"

[sizing]
max_position_ceiling_usd = 15.0
min_open_positions = 0
starter_trade_usd = 5.0

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 6.0
stake_pct = 0.20
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 1.00
sl_pct = 0.30
sl_min_age_minutes = 10
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 55
stdout_heartbeat_minutes = 30
