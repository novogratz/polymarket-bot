# auto_buyer_fade_wider_band — derived from auto_buyer_fade_quality_strict
# Hypothesis: revert price band to 0.15-0.80 + min_volume to $3k while keeping the tight 0.015 spread and $2 stake; if PnL recovers vs strict, the edge is "noisy markets + execution quality" not "premium markets only"
[run]
starting_cash = 20.0
mode = "panic_fade"

[sizing]
max_position_ceiling_usd = 2.5
min_open_positions = 0
starter_trade_usd = 1.5

[market_filters]
min_liquidity_usd = 800.0
min_volume_usd = 3000.0

[persistence]
enabled = false

[race]
max_hours = 1.5
scan_limit = 500
min_liquidity_usd = 1500.0
min_volume_24h_usd = 3000.0
min_price = 0.15
max_price = 0.80
max_spread = 0.015
stake_usd = 2.0
stake_pct = 0.10
max_orders_per_tick = 2
cash_floor_pct = 0.05
tp_pct = 0.05
sl_pct = 0.03
sl_min_age_minutes = 1
near_expiry_minutes = 3
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 115
stdout_heartbeat_minutes = 15