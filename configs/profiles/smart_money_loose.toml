# Profil "smart_money_loose" — NEW IDEA: pipeline smart-money mais
# avec consensus minimal (1 wallet) + USDC copié plus bas + lookback long.
# But : capter beaucoup plus de signaux pour mesurer en dry-run si le seuil
# "1 wallet" suffit déjà à battre l'aléatoire, ou si la valeur du consensus
# multi-wallets est réelle. Persistence reste activée pour filtrer le
# "lucky wallet du mois". Sizing micro pour éviter de manger la cash trop vite.

[run]
starting_cash = 100.0

[sizing]
position_pct = 0.10
max_position_ceiling_usd = 4.0
max_position_ceiling_pct = 0.20
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.20
cash_floor_pct = 0.02
min_open_positions = 8
starter_trade_usd = 2.0
assumed_live_balance_usd = 0.0

[trader_cohort]
leaderboard_window = "MONTH"
top_n = 150
min_trader_pnl = 500.0
min_trader_volume = 1000.0
min_trader_roi = 0.02
trade_fetch_concurrency = 24
trade_lookback_minutes = 60

[discovery]
scan_limit = 1000
soon_hours = 72
fresh_signal_bonus = 5.0
priority_category_bonus = 4.0

[market_filters]
min_liquidity_usd = 300.0
min_volume_usd = 500.0

[filters]
min_consensus = 1
fallback_consensus = 1
min_copied_usdc = 25.0
min_trade_usd = 0.5
max_chase_premium = 0.18
price_min = 0.03
price_max = 0.97
max_absolute_spread = 0.10
max_relative_spread = 0.60
signal_staleness_seconds = 20
min_hours_to_close = 0.1
max_hours_to_close = 4.0
max_orders_per_tick = 0
max_sports_positions = 5
sports_score_penalty = 5.0

[crypto]
min_buy_price = 0.50
min_hours_to_close = 6.0
max_hours_to_close = 4.0
min_copied_usdc = 200.0
min_consensus = 1
micro_min_consensus = 1
micro_max_entry_slippage = 0.08
micro_max_trade_usd = 2.0

[execution]
max_entry_slippage = 0.12
pending_order_ttl_seconds = 45
min_sell_usd = 0.5

[exits]
take_profit_ladder = "0.25:0.15,0.5:0.25,1.0:0.50,2.0:0.25,3.0:0.15"
trailing_stop_arm_pct = 0.25
trailing_stop_giveback = 0.50
peak_protect_arm_pct = 1.0
peak_protect_exit_pct = 0.40
stop_loss_pct = 0.40
stop_loss_min_age_minutes = 15
max_hold_hours = 4.0
near_expiry_min_profit = 0.05
near_expiry_minutes_to_close = 20
resolved_market_threshold = 0.97

[cohort_exit]
enabled = true
lookback_minutes = 180
min_age_minutes = 30
min_wallets = 1

[deep_fallback]
enabled = true
min_copied_usdc = 50.0

[reverse_lookup]
enabled = true
max_tokens = 150
min_copied_usdc = 25.0
min_liquidity_usd = 150.0
min_volume_usd = 300.0

[btc_edge]
enabled = false

[noise_fallback]
enabled = false

[auto_tune]
enabled = false

[persistence]
enabled = true
window_days = 30
cache_threshold = 0.60
intersect_periods = "WEEK,MONTH,ALL"
intersect_min = 2

[telemetry]
quiet = true
auto_interval_seconds = 80
stdout_heartbeat_minutes = 15
