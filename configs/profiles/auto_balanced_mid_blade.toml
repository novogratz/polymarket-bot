# auto_balanced_mid_blade — derived from auto_balanced_mid_panic_cut
# Hypothesis: balanced_mid with panic_cut still bleeding -55.5% (5 stuck opens) suggests its problem is hold-time not entry; port the microcut exit profile (1h/TP6/SL3) onto balanced_mid to test if the entry signal is salvageable with blade discipline
[run]
starting_cash = 20.0
mode = "claude_balanced_mid"

[sizing]
max_position_ceiling_usd = 2.5
min_open_positions = 0
starter_trade_usd = 1.5

[market_filters]
min_liquidity_usd = 1000.0
min_volume_usd = 3000.0

[persistence]
enabled = false

[race]
max_hours = 1.0
scan_limit = 500
min_liquidity_usd = 2500.0
min_volume_24h_usd = 4000.0
min_price = 0.30
max_price = 0.70
max_spread = 0.015
stake_usd = 1.5
stake_pct = 0.075
max_orders_per_tick = 2
cash_floor_pct = 0.05
tp_pct = 0.06
sl_pct = 0.03
sl_min_age_minutes = 1
near_expiry_minutes = 3
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 110
stdout_heartbeat_minutes = 15