# auto_kzerlepgm_aggressive — derived from kzerlepgm_ultimatestrategy
# Hypothesis: kzerlepgm mode is absent from current race despite being available; deploy with mid-aggressive sizing (6% stake) + wide TP (25%) to test whether the ultimate-strategy composite outperforms current losers in mark-to-market terms
[run]
starting_cash = 20.0
mode = "kzerlepgm_ultimatestrategy"

[sizing]
max_position_ceiling_usd = 6.0
min_open_positions = 0
starter_trade_usd = 2.5

[market_filters]
min_liquidity_usd = 400.0
min_volume_usd = 800.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 1200.0
min_volume_24h_usd = 1000.0
min_price = 0.08
max_price = 0.92
max_spread = 0.04
stake_usd = 2.5
stake_pct = 0.06
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.25
sl_pct = 0.12
sl_min_age_minutes = 2
near_expiry_minutes = 6
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 105
stdout_heartbeat_minutes = 15