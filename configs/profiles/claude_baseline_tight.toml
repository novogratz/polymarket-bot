# Profil "claude_baseline_tight" — A/B de kzerlepgm_baseline avec cohort + signal stricter.
# Thèse : qualité du signal > quantité. Seuls les meilleurs wallets, gros consensus.
# Diff vs kzerlepgm_baseline :
#   - leaderboard_window WEEK → MONTH, top_n 50 → 30
#   - min_trader_pnl $500 → $2000, min_trader_volume $1k → $5k, min_trader_roi 2% → 5%
#   - min_consensus 2 → 3, min_copied_usdc $50 → $150

[run]
starting_cash = 29.55

[sizing]
position_pct = 0.10
max_position_ceiling_usd = 36.94
max_position_ceiling_pct = 0.30
max_trade_usd = 0.0                       # 0 = pas de cap absolu, c'est ceiling qui gouverne
high_conviction_balance_fraction = 0.30
cash_floor_pct = 0.05
min_open_positions = 5
starter_trade_usd = 7.39
assumed_live_balance_usd = 29.55

[trader_cohort]
leaderboard_window = "MONTH"
top_n = 30
min_trader_pnl = 2000.0
min_trader_volume = 5000.0
min_trader_roi = 0.05
trade_fetch_concurrency = 16
trade_lookback_minutes = 240

[discovery]
scan_limit = 1000
soon_hours = 72
fresh_signal_bonus = 8.0
priority_category_bonus = 6.0

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 1000.0

[filters]
min_consensus = 3
fallback_consensus = 3
min_copied_usdc = 150.0
min_trade_usd = 1.0
max_chase_premium = 0.12
price_min = 0.03
price_max = 0.97
max_absolute_spread = 0.10
max_relative_spread = 0.35
signal_staleness_seconds = 10             # en réalité minutes (env var en min) — clé legacy
min_hours_to_close = 0.25
max_hours_to_close = 4.0                  # ⚠ 4h-only rule (vs 72.0 sur main:baseline)
max_orders_per_tick = 0                   # 0 = illimité (gouverné par cash floor)
max_sports_positions = 3
sports_score_penalty = 8.0

[crypto]
min_buy_price = 0.70
min_hours_to_close = 6.0
max_hours_to_close = 4.0                  # ⚠ 4h-only rule (vs 48.0 sur main:baseline)
min_copied_usdc = 1000.0
min_consensus = 3
micro_min_consensus = 3
micro_max_entry_slippage = 0.05
micro_max_trade_usd = 5.0

[execution]
max_entry_slippage = 0.10
pending_order_ttl_seconds = 45
min_sell_usd = 1.0

[exits]
take_profit_ladder = "0.25:0.15,0.5:0.25,1.0:0.50,2.0:0.25,3.0:0.15"
trailing_stop_arm_pct = 0.25
trailing_stop_giveback = 0.50
peak_protect_arm_pct = 1.0
peak_protect_exit_pct = 0.40
stop_loss_pct = 0.40
stop_loss_min_age_minutes = 15
max_hold_hours = 24.0
near_expiry_min_profit = 0.05
near_expiry_minutes_to_close = 20
resolved_market_threshold = 0.97

[cohort_exit]
enabled = true
lookback_minutes = 120
min_age_minutes = 30
min_wallets = 2

[deep_fallback]
enabled = true
min_copied_usdc = 250.0

[reverse_lookup]
enabled = true
max_tokens = 30
min_copied_usdc = 100.0
min_liquidity_usd = 200.0
min_volume_usd = 500.0

[btc_edge]
enabled = false
per_trade_cap_usd = 5.0
min_edge_over_market = 0.08
min_buy_price = 0.05
max_buy_price = 0.95
max_spread = 0.04
min_trade_usd = 1.0
min_model_probability = 0.90
min_hours_to_close = 0.5
volatility_days = 7

[noise_fallback]
enabled = false                           # baseline : aucun pari sans signal
max_trades_per_tick = 2
stake_usd = 7.39
cash_pressure_threshold = 0.35
min_buy_price = 0.20
max_buy_price = 0.80
max_spread = 0.04

[auto_tune]
enabled = true
min_closed_trades = 30

[persistence]
enabled = false                           # référence A/B sans filtre persistance

[telemetry]
quiet = false
auto_interval_seconds = 90
