# Live-90 smart-money profile — 18% stake, used by live-mode CLI tests.

[run]
starting_cash = 20.0
mode = "smart_money"

[sizing]
position_pct = 0.18
min_open_positions = 0
starter_trade_usd = 1.0
assumed_live_balance_usd = 20.0

[filters]
min_consensus = 2
fallback_consensus = 2
min_copied_usdc = 100.0
max_chase_premium = 0.03
max_orders_per_tick = 5

[exits]
stop_loss_pct = 0.40
max_hold_hours = 24.0

[btc_edge]
enabled = false

[noise_fallback]
enabled = false

[deep_fallback]
enabled = true
