# auto_mean_reversion_fade_micro — derived from mean_reversion_fade
# Hypothesis: aggressive_buyer_detection bleeds -87% systematically, which implies the inverse trade (fading aggressive buys via mean_reversion_fade — mode never auto-spawned) should capture the symmetric edge; micro size + tight 6/4 exits validate the inverse hypothesis without committing capital
[run]
starting_cash = 100.0
mode = "mean_reversion_fade"

[sizing]
max_position_ceiling_usd = 2.0
min_open_positions = 0
starter_trade_usd = 1.0

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 1500.0

[persistence]
enabled = false

[race]
max_hours = 1.5
scan_limit = 500
min_liquidity_usd = 1200.0
min_volume_24h_usd = 1800.0
min_price = 0.20
max_price = 0.80
max_spread = 0.025
stake_usd = 1.0
stake_pct = 0.05
max_orders_per_tick = 2
cash_floor_pct = 0.05
tp_pct = 0.06
sl_pct = 0.04
sl_min_age_minutes = 1
near_expiry_minutes = 3
resolved_exit_threshold = 0.96

[telemetry]
quiet = true
auto_interval_seconds = 140
stdout_heartbeat_minutes = 15