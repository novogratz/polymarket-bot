# auto_whale_entry_narrowband — derived from auto_whale_solo_sniper
# Hypothesis: whale_entry_detection picks single dominant wallet entries; restrict to 0.30–0.70 price band (avoids odds-compression near 0/1) with 12% TP / 7% SL — test if mid-band whale flow has cleaner reversion than edge bets
[run]
starting_cash = 100.0
mode = "whale_entry_detection"

[sizing]
max_position_ceiling_usd = 4.0
min_open_positions = 0
starter_trade_usd = 2.5

[market_filters]
min_liquidity_usd = 600.0
min_volume_usd = 1500.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 2000.0
min_volume_24h_usd = 2000.0
min_price = 0.30
max_price = 0.70
max_spread = 0.03
stake_usd = 2.5
stake_pct = 0.12
max_orders_per_tick = 2
cash_floor_pct = 0.05
tp_pct = 0.12
sl_pct = 0.07
sl_min_age_minutes = 2
near_expiry_minutes = 6
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 90
stdout_heartbeat_minutes = 15