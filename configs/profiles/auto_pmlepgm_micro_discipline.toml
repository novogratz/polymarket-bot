# auto_pmlepgm_micro_discipline — derived from pmlepgm_counter_panic_fade
# Hypothesis: live winner pmlepgm_counter_panic_fade has +$15 / 66% wr in prior dry; port to race with ultra-tight 6% SL + 2.5% stake to test whether discipline preserves the with-momentum edge when capital is constrained ($20 vs $42)
[run]
starting_cash = 100.0
mode = "pmlepgm_counter_panic_fade"

[sizing]
max_position_ceiling_usd = 4.0
min_open_positions = 0
starter_trade_usd = 2.0

[market_filters]
min_liquidity_usd = 250.0
min_volume_usd = 800.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 1000.0
min_volume_24h_usd = 800.0
min_price = 0.08
max_price = 0.92
max_spread = 0.04
stake_usd = 2.0
stake_pct = 0.025
max_orders_per_tick = 2
cash_floor_pct = 0.05
tp_pct = 0.18
sl_pct = 0.06
sl_min_age_minutes = 1
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 75
stdout_heartbeat_minutes = 15