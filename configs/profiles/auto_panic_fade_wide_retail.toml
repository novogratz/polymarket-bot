# auto_panic_fade_wide_retail — derived from auto_buyer_fade_microcut
# Hypothesis: aggressive_buyer_detection bleeds -88% because retail-pile signals systematically fade; combine microcut TP5/SL3 panic_fade WITH aggressive_buyer's wide entry envelope (0.05–0.95, max_spread 0.04, more orders/tick) to harvest the exact piles aggressive_buyer is losing on
[run]
starting_cash = 100.0
mode = "panic_fade"

[sizing]
max_position_ceiling_usd = 2.0
min_open_positions = 0
starter_trade_usd = 1.3

[market_filters]
min_liquidity_usd = 400.0
min_volume_usd = 1500.0

[persistence]
enabled = false

[race]
max_hours = 2.0
scan_limit = 600
min_liquidity_usd = 800.0
min_volume_24h_usd = 1500.0
min_price = 0.05
max_price = 0.95
max_spread = 0.04
stake_usd = 1.3
stake_pct = 0.065
max_orders_per_tick = 5
cash_floor_pct = 0.05
tp_pct = 0.05
sl_pct = 0.03
sl_min_age_minutes = 1
near_expiry_minutes = 3
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 75
stdout_heartbeat_minutes = 15