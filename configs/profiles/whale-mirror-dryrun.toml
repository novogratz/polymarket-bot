# Dry-run mirror profile for the top 20 whale targets.
#
# Usage:
#   uv run pmbot auto-loop --profile whale-mirror-dryrun --dry-run --run mirror-whales
#
# This profile uses mirror mode: every new eligible target-wallet BUY is
# copied into the named dry-run ledger with a fixed simulated stake.

[run]
starting_cash = 100.0
mode = "mirror"

[mirror]
target = """
bossoskil1,
swisstony,
RN1,
jdsahgf,
surfandturf,
Pestle,
JewishNinja,
everydaymortgage,
yaya88888,
beachboy4,
Golgatha,
VPenguin,
frankfrankfrank,
anoin123,
wan123,
downtownfee,
Oddn,
Supah9ga,
Talvez10,
0x492442EaB586F242B53bDa933fD5dE859c8A3782
"""

# Simulated stake per mirrored BUY. Mirror mode currently supports fixed
# USD sizing; $1 matches the original 1% intent for a $100 dry-run bankroll.
# Sizing & Ratios
copy_ratio = 0.50
tiered_copy_ratios = "0.0:0.35,25000:0.50,100000:0.75"
size_usd = 500.0
max_position_pct = 0.50
# Mirror target-wallet SELLs too, so the dry-run exits when they exit.
mirror_sells = true
# Copy all target bets, including small ones.
min_target_stake_usd = 100.0
min_liquidity_usd = 10000.0
max_chase_premium = 0.05
min_buy_price = 0.02
max_buy_price = 0.98
max_open_positions = 12
max_category_exposure_pct = 0.50

[telemetry]
quiet = false
auto_interval_seconds = 10
