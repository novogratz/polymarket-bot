# Profil "news" — momentum sur les marchés expirant sous 4h.
#
# Stratégie indépendante de smart-money: pure action de prix Polymarket
# + boost optionnel via flux smart-money en temps réel. Seule contrainte
# dure: end_date <= now + 4h. Tous les autres seuils sont des filtres
# tunables.

[run]
starting_cash = 20.0
mode = "news"

[sizing]
max_position_ceiling_usd = 3.0
min_open_positions = 4
starter_trade_usd = 1.5
assumed_live_balance_usd = 20.0

position_pct = 0.10
max_position_ceiling_pct = 0.15
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.20
cash_floor_pct = 0.10
[market_filters]
min_liquidity_usd = 300.0
min_volume_usd = 300.0

[execution]
pending_order_ttl_seconds = 60
min_sell_usd = 1.0

max_entry_slippage = 0.06
[trader_cohort]
# Réutilisé pour le boost smart-money flow (lecture seule du leaderboard).
leaderboard_window = "MONTH"
top_n = 50
min_trader_pnl = 1000.0
min_trader_volume = 2000.0
min_trader_roi = 0.03
trade_fetch_concurrency = 24
trade_lookback_minutes = 60

[persistence]
# Désactivé pour ce profil — on n'a pas besoin du filtre persistance
# d'edge pour évaluer un simple flux récent.
enabled = false

[news]
max_hours = 48.0
min_hours = 0.25
min_price = 0.08
max_price = 0.90
max_spread = 0.06
max_relative_spread = 0.30
min_liquidity_usd = 300.0
min_volume_24h_usd = 150.0
require_positive_momentum = true
min_abs_momentum = 0.02
take_profit_pct = 0.25
stop_loss_pct = 0.25
stop_loss_min_age_minutes = 10
near_expiry_min_profit = 0.0
near_expiry_minutes = 5
resolved_exit_threshold = 0.97
max_orders_per_tick = 3
stake_usd = 1.5
scan_limit = 500
cash_floor_pct = 0.10
partial_tp_fraction = 0.50              # vend 50% au TP, garde 50% en trailing
trailing_arm_pct = 0.35                 # arm trailing dès +35% peak
trailing_giveback_pct = 0.50            # exit si on rend 50% du peak
max_stake_usd = 1.5
min_stake_usd = 1.0
smart_money_boost_enabled = true        # bonus si leaderboard wallets achètent ce token
smart_money_min_flow_usd = 150.0
tight_stop_hours = 1.0                  # < 1h restante → SL serre
tight_stop_pct = 0.15
very_tight_stop_hours = 0.5             # < 30 min → SL très serré
very_tight_stop_pct = 0.10

[telemetry]
quiet = false
auto_interval_seconds = 300
stdout_heartbeat_minutes = 15

[discovery]
soon_hours = 48

[filters]
max_hours_to_close = 48.0
max_orders_per_tick = 3
min_trade_usd = 1.0
max_absolute_spread = 0.06
max_relative_spread = 0.35
max_chase_premium = 0.12

[crypto]
max_hours_to_close = 48.0

[exits]
stop_loss_pct = 0.25
stop_loss_min_age_minutes = 10
max_hold_hours = 24.0
near_expiry_exit_losers = true
near_expiry_loser_minutes = 45

[noise_fallback]
enabled = false

[race]
min_liquidity_usd = 300.0
min_volume_24h_usd = 150.0
max_spread = 0.06
stake_usd = 1.5
stake_pct = 0.075
max_orders_per_tick = 3

[edge]
min_liquidity_usd = 300.0
min_volume_24h_usd = 150.0
max_spread = 0.06
max_position_pct = 0.075
max_orders_per_tick = 3
