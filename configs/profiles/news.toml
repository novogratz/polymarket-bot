# Profil "news" — momentum sur les marchés expirant sous 4h.
#
# Stratégie indépendante de smart-money: pure action de prix Polymarket
# + boost optionnel via flux smart-money en temps réel. Seule contrainte
# dure: end_date <= now + 4h. Tous les autres seuils sont des filtres
# tunables.

[run]
starting_cash = 20.0
mode = "news"

[sizing]
max_position_ceiling_usd = 15.0
min_open_positions = 0
starter_trade_usd = 5.0
assumed_live_balance_usd = 0.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[execution]
pending_order_ttl_seconds = 60
min_sell_usd = 1.0

[trader_cohort]
# Réutilisé pour le boost smart-money flow (lecture seule du leaderboard).
leaderboard_window = "MONTH"
top_n = 50
min_trader_pnl = 1000.0
min_trader_volume = 2000.0
min_trader_roi = 0.03
trade_fetch_concurrency = 24
trade_lookback_minutes = 60

[persistence]
# Désactivé pour ce profil — on n'a pas besoin du filtre persistance
# d'edge pour évaluer un simple flux récent.
enabled = false

[news]
max_hours = 4.0                         # ⚠ règle dure
min_hours = 0.083                       # 5 min buffer d'exécution
min_price = 0.10
max_price = 0.70                        # upside obligatoire
max_spread = 0.04
max_relative_spread = 0.30
min_liquidity_usd = 1500.0              # liquidité solide
min_volume_24h_usd = 500.0
require_positive_momentum = true
min_abs_momentum = 0.03
take_profit_pct = 0.25                  # +25% → vente partielle
stop_loss_pct = 0.25                    # base -25% (adapté par tight_stop_*)
stop_loss_min_age_minutes = 3
near_expiry_min_profit = 0.0
near_expiry_minutes = 5
resolved_exit_threshold = 0.97
max_orders_per_tick = 5
stake_usd = 5.0                         # mise baseline (tier "mid")
scan_limit = 500
cash_floor_pct = 0.02
partial_tp_fraction = 0.50              # vend 50% au TP, garde 50% en trailing
trailing_arm_pct = 0.35                 # arm trailing dès +35% peak
trailing_giveback_pct = 0.50            # exit si on rend 50% du peak
max_stake_usd = 12.0                    # tier "high" (smart-money flow + low price)
min_stake_usd = 3.0                     # tier "low"
smart_money_boost_enabled = true        # bonus si leaderboard wallets achètent ce token
smart_money_min_flow_usd = 250.0        # seuil min pour le bonus
tight_stop_hours = 1.0                  # < 1h restante → SL serre
tight_stop_pct = 0.15
very_tight_stop_hours = 0.5             # < 30 min → SL très serré
very_tight_stop_pct = 0.10

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15
