# auto_strong_breakout_sizeup — derived from claude_strong_breakout
# Hypothesis: parent profile is winning at +7.2% with conservative stake_pct 0.15. The thesis works — size it up. Bump stake_pct to 0.25, starter to $7, ceiling to $20. Same exits.
[run]
starting_cash = 20.0
mode = "claude_strong_breakout"

[sizing]
max_position_ceiling_usd = 20.0
min_open_positions = 0
starter_trade_usd = 7.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 7.0
stake_pct = 0.25
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.25
sl_pct = 0.25
sl_min_age_minutes = 3
near_expiry_minutes = 0
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 45
stdout_heartbeat_minutes = 15