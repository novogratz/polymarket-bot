# momentum_exhaustion_fade — momentum_exhaustion_reversal + patient hold
# Thesis: after exhaustion, reversal takes minutes; hold longer than reflex
[run]
starting_cash = 100.0
mode = "momentum_exhaustion_reversal"

[sizing]
max_position_ceiling_usd = 8.0
min_open_positions = 0
starter_trade_usd = 4.0

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 4.0
stake_pct = 0.15
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.35
sl_pct = 0.25
sl_min_age_minutes = 12
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 70
stdout_heartbeat_minutes = 30
