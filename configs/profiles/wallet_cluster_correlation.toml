# Profil "wallet_cluster_correlation" — #3 — degraded; true correlation needs offline co-trading graph.

[run]
starting_cash = 46.0
mode = "wallet_cluster_correlation"

[sizing]
max_position_ceiling_usd = 15.0
min_open_positions = 0
starter_trade_usd = 5.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 5.0
stake_pct = 0.15
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.25                           # +25% TP — capture gains before reversal
sl_pct = 0.25                           # -25% SL — cap losers (re-enabled after no-SL bled)
sl_min_age_minutes = 3
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15
