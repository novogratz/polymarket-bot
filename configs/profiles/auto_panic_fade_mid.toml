# auto_panic_fade_mid — derived from pmlepgm_counter_panic_fade
# Hypothesis: live winner is panic_fade — replicate but with looser entry (min_vol $1k vs $3k) and tighter SL (-15%) to catch a 4h-window panic earlier; bet WITH the winning side after a 10¢+ intraday spike
[run]
starting_cash = 20.0
mode = "pmlepgm_counter_panic_fade"

[sizing]
max_position_ceiling_usd = 4.0
min_open_positions = 0
starter_trade_usd = 2.0

[market_filters]
min_liquidity_usd = 250.0
min_volume_usd = 500.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 400.0
min_volume_24h_usd = 1000.0
min_price = 0.10
max_price = 0.90
max_spread = 0.06
stake_usd = 2.0
stake_pct = 0.10
max_orders_per_tick = 4
cash_floor_pct = 0.05
tp_pct = 0.20
sl_pct = 0.15
sl_min_age_minutes = 3
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 75
stdout_heartbeat_minutes = 15