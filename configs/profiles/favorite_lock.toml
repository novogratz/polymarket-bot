# favorite_lock — only buy locked-in winners
#
# Thesis: the cohort has been losing because they buy cheap lottery tickets
# (No tokens at $0.03 hoping for $1) that resolve against them. This profile
# flips that: ONLY buy near-certain winners (ask >= 0.88), let them resolve
# at $1.00 for a +12-15% gain. Smaller win per trade but >95% win rate when
# the market is already that confident.
#
# Risk: a 0.92 favorite still flips ~8% of the time. -92% loss on those
# tail events. Net EV is positive IF entry filter is strict (don't buy
# anything below 0.88).

[run]
starting_cash = 20.0

[sizing]
position_pct = 0.10
max_position_ceiling_usd = 3.0
max_position_ceiling_pct = 0.15
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.20
cash_floor_pct = 0.10
min_open_positions = 4
starter_trade_usd = 1.5
assumed_live_balance_usd = 20.0

[trader_cohort]
leaderboard_window = "WEEK"
top_n = 100
min_trader_pnl = 100.0
min_trader_volume = 200.0
min_trader_roi = 0.005
trade_fetch_concurrency = 16
trade_lookback_minutes = 240

[discovery]
scan_limit = 1000
soon_hours = 48
fresh_signal_bonus = 8.0
priority_category_bonus = 6.0

[market_filters]
min_liquidity_usd = 300.0
min_volume_usd = 300.0

[filters]
# The CORE bet: only buy near-certain winners (ask 0.88-0.97).
# Refuses to follow cohort into lottery tickets — the source of all bleed.
min_consensus = 1
fallback_consensus = 1
min_copied_usdc = 15.0
min_trade_usd = 1.0
max_chase_premium = 0.12
price_min = 0.78
price_max = 0.97
max_absolute_spread = 0.06
max_relative_spread = 0.35
signal_staleness_seconds = 60
min_hours_to_close = 0.25
max_hours_to_close = 48.0
max_orders_per_tick = 3
max_sports_positions = 5
sports_score_penalty = 0.0

[crypto]
min_buy_price = 0.88
min_hours_to_close = 0.25
max_hours_to_close = 48.0
min_copied_usdc = 10.0
min_consensus = 1
micro_min_consensus = 1
micro_max_entry_slippage = 0.02
micro_max_trade_usd = 3.0

[execution]
max_entry_slippage = 0.06
pending_order_ttl_seconds = 45
min_sell_usd = 0.5

[exits]
# Lock gains aggressively. No need to ride to +200% on a +12% bet.
take_profit_ladder = "0.05:0.50,0.10:0.50"
trailing_stop_arm_pct = 0.05
trailing_stop_giveback = 0.50
peak_protect_arm_pct = 0.10
peak_protect_exit_pct = 0.05
stop_loss_pct = 0.25
stop_loss_min_age_minutes = 10
max_hold_hours = 24.0
near_expiry_min_profit = 0.02
near_expiry_minutes_to_close = 30
resolved_market_threshold = 0.97

near_expiry_exit_losers = true
near_expiry_loser_minutes = 45
[cohort_exit]
enabled = false                          # don't let cohort selling spook us out of a locked winner

[deep_fallback]
enabled = false

[reverse_lookup]
enabled = false

[btc_edge]
enabled = false
per_trade_cap_usd = 5.0
min_edge_over_market = 0.08
min_buy_price = 0.05
max_buy_price = 0.95
max_spread = 0.04
min_trade_usd = 1.0
min_model_probability = 0.90
min_hours_to_close = 0.5
volatility_days = 7

[noise_fallback]
enabled = false
max_trades_per_tick = 2
stake_usd = 1.50
cash_pressure_threshold = 0.35
min_buy_price = 0.85
max_buy_price = 0.97
max_spread = 0.04

[auto_tune]
enabled = false                          # don't tune a price-band strategy

[persistence]
enabled = false

[telemetry]
quiet = false
auto_interval_seconds = 300

[race]
stake_usd = 1.5
stake_pct = 0.075
max_orders_per_tick = 3
cash_floor_pct = 0.10
min_liquidity_usd = 300.0
min_volume_24h_usd = 150.0
max_spread = 0.06

[news]
min_liquidity_usd = 300.0
min_volume_24h_usd = 150.0
max_spread = 0.06
stake_usd = 1.5
max_stake_usd = 1.5
max_orders_per_tick = 3

[edge]
min_liquidity_usd = 300.0
min_volume_24h_usd = 150.0
max_spread = 0.06
max_position_pct = 0.075
max_orders_per_tick = 3
