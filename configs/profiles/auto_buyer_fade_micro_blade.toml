# auto_buyer_fade_micro_blade — derived from auto_buyer_fade_microcut
# Hypothesis: the +15.1% microcut works because of fast cut, not micro size; push stop to 2% and tp to 4% with the same wide band to test whether speed-of-exit is the dominant edge versus stake compression
[run]
starting_cash = 29.55
mode = "panic_fade"

[sizing]
max_position_ceiling_usd = 2.96
min_open_positions = 0
starter_trade_usd = 1.48

[market_filters]
min_liquidity_usd = 600.0
min_volume_usd = 2000.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 1000.0
min_volume_24h_usd = 2000.0
min_price = 0.10
max_price = 0.85
max_spread = 0.020
stake_usd = 2.22
stake_pct = 0.075
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.04
sl_pct = 0.02
sl_min_age_minutes = 1
near_expiry_minutes = 3
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 95
stdout_heartbeat_minutes = 15