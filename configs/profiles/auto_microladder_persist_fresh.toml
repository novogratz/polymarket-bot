# auto_microladder_persist_fresh — derived from auto_microladder_persist_combo + auto_baseline_fresh_qe_combo
# Hypothesis: triple-stack of the 3 winning orthogonal edges. Parent (#3 winner) uses 240min lookback. Shrink to 30min (#1 winner's fresh window) — single knob — to test whether fresh-cohort signal, persistence filter, and microladder TP compound. If yes, this should outperform all three parents.
[run]
starting_cash = 20.0

[sizing]
position_pct = 0.10
max_position_ceiling_usd = 25.0
max_position_ceiling_pct = 0.30
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.30
cash_floor_pct = 0.05
min_open_positions = 5
starter_trade_usd = 5.0
assumed_live_balance_usd = 20.0

[trader_cohort]
leaderboard_window = "WEEK"
leaderboard_windows = "WEEK,MONTH,ALL"
top_n = 50
min_trader_pnl = 500.0
min_trader_volume = 1000.0
min_trader_roi = 0.02
trade_fetch_concurrency = 16
trade_lookback_minutes = 30

[discovery]
scan_limit = 1000
soon_hours = 72
fresh_signal_bonus = 8.0
priority_category_bonus = 6.0

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 1000.0

[filters]
min_consensus = 2
fallback_consensus = 2
min_copied_usdc = 50.0
min_trade_usd = 1.0
max_chase_premium = 0.12
price_min = 0.03
price_max = 0.97
max_absolute_spread = 0.10
max_relative_spread = 0.35
signal_staleness_seconds = 10
min_hours_to_close = 0.25
max_hours_to_close = 4.0
max_orders_per_tick = 0
max_sports_positions = 3
sports_score_penalty = 8.0

[crypto]
min_buy_price = 0.70
min_hours_to_close = 6.0
max_hours_to_close = 4.0
min_copied_usdc = 1000.0
min_consensus = 3
micro_min_consensus = 3
micro_max_entry_slippage = 0.05
micro_max_trade_usd = 5.0

[execution]
max_entry_slippage = 0.10
pending_order_ttl_seconds = 45
min_sell_usd = 1.0

[exits]
take_profit_ladder = "0.15:0.40,0.35:0.30,0.7:0.20,1.5:0.10"
trailing_stop_arm_pct = 0.15
trailing_stop_giveback = 0.50
peak_protect_arm_pct = 0.60
peak_protect_exit_pct = 0.25
stop_loss_pct = 0.28
stop_loss_min_age_minutes = 8
max_hold_hours = 4.0
near_expiry_min_profit = 0.05
near_expiry_minutes_to_close = 20
resolved_market_threshold = 0.97

[cohort_exit]
enabled = true
lookback_minutes = 120
min_age_minutes = 30
min_wallets = 2

[deep_fallback]
enabled = true
min_copied_usdc = 250.0

[reverse_lookup]
enabled = true
max_tokens = 30
min_copied_usdc = 100.0
min_liquidity_usd = 200.0
min_volume_usd = 500.0

[btc_edge]
enabled = false
per_trade_cap_usd = 5.0
min_edge_over_market = 0.08

[noise_fallback]
enabled = false

[auto_tune]
enabled = true
min_closed_trades = 30

[persistence]
enabled = true
window_days = 30
cache_threshold = 0.70
intersect_periods = "WEEK,MONTH,ALL"
intersect_min = 2

[race]
max_hours = 4.0

[telemetry]
quiet = true
auto_interval_seconds = 125
stdout_heartbeat_minutes = 15