# auto_kzerlepgm_discipline — derived from auto_kzerlepgm_aggressive
# Hypothesis: the aggressive kzerlepgm (-62%, 6% stake, 25% TP) is bleeding from over-sizing on a composite signal whose strength we don't yet know; deploy the disciplined mirror — 2% stake, tight 8% TP / 5% SL, narrow price band, micro positions — to isolate whether the mode has any baseline edge before scaling
[run]
starting_cash = 20.0
mode = "kzerlepgm_ultimatestrategy"

[sizing]
max_position_ceiling_usd = 2.5
min_open_positions = 0
starter_trade_usd = 1.5

[market_filters]
min_liquidity_usd = 800.0
min_volume_usd = 1500.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 2000.0
min_volume_24h_usd = 2000.0
min_price = 0.15
max_price = 0.85
max_spread = 0.025
stake_usd = 1.5
stake_pct = 0.02
max_orders_per_tick = 2
cash_floor_pct = 0.05
tp_pct = 0.08
sl_pct = 0.05
sl_min_age_minutes = 2
near_expiry_minutes = 4
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 150
stdout_heartbeat_minutes = 15