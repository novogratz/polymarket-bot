# auto_extreme_consensus_blade — derived from auto_extreme_consensus_microcut
# Hypothesis: patient consensus (-95.7%) and even fast_cut (-15%) bleed; collapse to 45min max with TP4/SL2 and 0.5c spread — if extreme-consensus has any edge it must show in <1h, otherwise it's noise we should not pay theta on
[run]
starting_cash = 20.0
mode = "claude_extreme_consensus"

[sizing]
max_position_ceiling_usd = 2.5
min_open_positions = 0
starter_trade_usd = 1.5

[market_filters]
min_liquidity_usd = 2000.0
min_volume_usd = 5000.0

[persistence]
enabled = false

[race]
max_hours = 0.75
scan_limit = 500
min_liquidity_usd = 5000.0
min_volume_24h_usd = 8000.0
min_price = 0.30
max_price = 0.70
max_spread = 0.005
stake_usd = 1.5
stake_pct = 0.075
max_orders_per_tick = 2
cash_floor_pct = 0.05
tp_pct = 0.04
sl_pct = 0.02
sl_min_age_minutes = 1
near_expiry_minutes = 2
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 65
stdout_heartbeat_minutes = 15