# auto_strongbreak_blade_sl — derived from claude_strong_breakout
# Hypothesis: strong_breakout edge is binary (works fast or doesn't); cut SL from 25% to 15% with min_age 2min to trim losers harder while keeping TP at 25%.
[run]
starting_cash = 20.0
mode = "claude_strong_breakout"

[sizing]
max_position_ceiling_usd = 15.0
min_open_positions = 0
starter_trade_usd = 5.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 5.0
stake_pct = 0.15
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.25
sl_pct = 0.15
sl_min_age_minutes = 2
near_expiry_minutes = 0
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 45
stdout_heartbeat_minutes = 15