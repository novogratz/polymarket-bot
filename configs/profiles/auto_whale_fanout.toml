# auto_whale_fanout — derived from whale_entry_detection (winner #3, n=4 75% WR)
# Hypothesis: smaller stake (0.15 → 0.10) × more orders/tick (5 → 8) — amplifies shot count on the proven signal while reducing per-shot variance. Tests if whale signal scales with fan-out rather than per-trade size.
[run]
starting_cash = 20.0
mode = "whale_entry_detection"

[sizing]
max_position_ceiling_usd = 10.0
min_open_positions = 0
starter_trade_usd = 3.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 3.0
stake_pct = 0.10
max_orders_per_tick = 8
cash_floor_pct = 0.02
tp_pct = 0.25
sl_pct = 0.25
sl_min_age_minutes = 3
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 60
stdout_heartbeat_minutes = 15