# auto_panic_fade_atomscalp — derived from auto_buyer_fade_microcut
# Hypothesis: microcut (+15.1%) is the only profitable variant; compress its 1.5h/TP5/SL3 to 45min/TP3/SL2 to test if the panic_fade edge is entirely in the first ~30min revertal window
[run]
starting_cash = 20.0
mode = "panic_fade"

[sizing]
max_position_ceiling_usd = 2.5
min_open_positions = 0
starter_trade_usd = 1.5

[market_filters]
min_liquidity_usd = 600.0
min_volume_usd = 2500.0

[persistence]
enabled = false

[race]
max_hours = 0.75
scan_limit = 500
min_liquidity_usd = 1500.0
min_volume_24h_usd = 2000.0
min_price = 0.20
max_price = 0.78
max_spread = 0.02
stake_usd = 1.5
stake_pct = 0.075
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.03
sl_pct = 0.02
sl_min_age_minutes = 1
near_expiry_minutes = 2
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 65
stdout_heartbeat_minutes = 15