# Profil "claude_endgame_sweep" — claude #6
# Entrée : bid 0.65-0.985 + ask ≤0.95 + ≤2h + spread ≤1¢ + vol ≥$500.
# Plus de "endgame" stricto sensu — c'est un chasseur de favoris large
# qui mise sur l'asymétrie TP +25% / SL -10%. EV positive si win rate
# ≈ probabilité implicite (~65% sur entrée 0.65).

[run]
starting_cash = 100.0
mode = "claude_endgame_sweep"

[sizing]
max_position_ceiling_usd = 15.0
min_open_positions = 0
starter_trade_usd = 5.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 5.0
stake_pct = 0.15
max_orders_per_tick = 5
cash_floor_pct = 0.10
tp_pct = 1.00                            # TP désactivé — on laisse rouler jusqu'au resolved_exit 0.97
sl_pct = 0.20                            # SL plus large pour absorber le bruit sur entrées 0.65+
sl_min_age_minutes = 3
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15
