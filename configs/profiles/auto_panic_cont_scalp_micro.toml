# auto_panic_cont_scalp_micro — derived from momentum_panic_continuation
# Hypothesis: all existing panic_cont variants concentrate stake (0.25+). Test the opposite: micro stake (0.10) + 8 orders/tick + tight tp/sl (0.20/0.13) to sample many panic continuations at once, hunting for high-frequency edge over per-trade size.
[run]
starting_cash = 20.0
mode = "pmlepgm_counter_panic_fade"

[sizing]
max_position_ceiling_usd = 8.0
min_open_positions = 0
starter_trade_usd = 3.0

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 4.0
stake_pct = 0.10
max_orders_per_tick = 8
cash_floor_pct = 0.02
tp_pct = 0.20
sl_pct = 0.13
sl_min_age_minutes = 2
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 65
stdout_heartbeat_minutes = 15