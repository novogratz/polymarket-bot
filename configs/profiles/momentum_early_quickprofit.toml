# momentum_early_quickprofit — early_momentum_detection + +15% TP / -10% SL
# Thesis: small-momentum captures, take +15% and bounce, never bleed
[run]
starting_cash = 20.0
mode = "early_momentum_detection"

[sizing]
max_position_ceiling_usd = 5.0
min_open_positions = 0
starter_trade_usd = 3.0

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 3.0
stake_pct = 0.10
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.15
sl_pct = 0.10
sl_min_age_minutes = 3
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 50
stdout_heartbeat_minutes = 30
