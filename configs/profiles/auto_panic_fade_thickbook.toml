# auto_panic_fade_thickbook — derived from auto_buyer_fade_microcut
# Hypothesis: microcut's edge may come from *liquidity* (orderbook can absorb the panic). Keep tight TP/SL but require 3x deeper liquidity ($4.5k/$8k); if reversion is liquidity-gated, win rate should jump vs microcut parent
[run]
starting_cash = 20.0
mode = "panic_fade"

[sizing]
max_position_ceiling_usd = 2.5
min_open_positions = 0
starter_trade_usd = 1.5

[market_filters]
min_liquidity_usd = 1500.0
min_volume_usd = 5000.0

[persistence]
enabled = false

[race]
max_hours = 2.0
scan_limit = 500
min_liquidity_usd = 4500.0
min_volume_24h_usd = 8000.0
min_price = 0.18
max_price = 0.82
max_spread = 0.015
stake_usd = 1.8
stake_pct = 0.09
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.06
sl_pct = 0.035
sl_min_age_minutes = 2
near_expiry_minutes = 3
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 130
stdout_heartbeat_minutes = 15