# auto_strongbreak_pricetrim — derived from claude_strong_breakout
# Hypothesis: -92% losers all eat resolution-edge traps near 0.05/0.95; trimming the price band to 0.15-0.85 should kill end-of-life binary chops while keeping the breakout's +3.6% midband edge — none of 10 existing breakout variants touches min/max_price.
[run]
starting_cash = 20.0
mode = "claude_strong_breakout"

[sizing]
max_position_ceiling_usd = 15.0
min_open_positions = 0
starter_trade_usd = 5.0

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.15
max_price = 0.85
max_spread = 0.04
stake_usd = 5.0
stake_pct = 0.15
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.28
sl_pct = 0.22
sl_min_age_minutes = 3
near_expiry_minutes = 0
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 115
stdout_heartbeat_minutes = 15