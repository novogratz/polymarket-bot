# auto_balanced_mid_noSL — derived from auto_balanced_mid_panic_cut
# Hypothesis: panic_cut sibling is -55% with 5 opens stuck; pure no-SL variant of claude_balanced_mid with TP25/SL60 and 5min min_age tests whether removing the tight cut alone preserves equity — if true, panic_cut's loss is the SL, not the mode
[run]
starting_cash = 29.55
mode = "claude_balanced_mid"

[sizing]
max_position_ceiling_usd = 7.39
min_open_positions = 0
starter_trade_usd = 2.96

[market_filters]
min_liquidity_usd = 100.0
min_volume_usd = 100.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 2.96
stake_pct = 0.05
max_orders_per_tick = 3
cash_floor_pct = 0.02
tp_pct = 0.25
sl_pct = 0.60
sl_min_age_minutes = 5
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 65
stdout_heartbeat_minutes = 15