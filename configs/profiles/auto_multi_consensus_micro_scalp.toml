# auto_multi_consensus_micro_scalp — derived from auto_multi_consensus_safe
# Hypothesis: combine multi_signal_consensus entry with micro_scalping-style 7% TP / 4% SL and tiny $1.5 stakes; tests whether consensus + ultra-small-size scalp can survive the current chop where every larger-size variant is underwater
[run]
starting_cash = 100.0
mode = "multi_signal_consensus"

[sizing]
max_position_ceiling_usd = 2.0
min_open_positions = 0
starter_trade_usd = 1.5

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 1200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 1200.0
min_volume_24h_usd = 800.0
min_price = 0.10
max_price = 0.90
max_spread = 0.04
stake_usd = 1.5
stake_pct = 0.015
max_orders_per_tick = 4
cash_floor_pct = 0.04
tp_pct = 0.07
sl_pct = 0.04
sl_min_age_minutes = 1
near_expiry_minutes = 4
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 105
stdout_heartbeat_minutes = 15