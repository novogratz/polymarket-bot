# Profil tight-filters — filtres très serrés, sizing modéré.
#
# Pour ne prendre que les meilleurs signaux : consensus ≥3,
# copied ≥$250, spread serré, prix éloigné des extrêmes. Persistance
# stricte (3/3 listes + cache 80%). Pas de noise.
#
# Toutes les clés sont documentées dans docs/PROFILES.md.

[run]
starting_cash = 29.55

[sizing]
position_pct = 0.10
max_position_ceiling_usd = 147.75
max_position_ceiling_pct = 0.30
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.30
cash_floor_pct = 0.02
min_open_positions = 3
starter_trade_usd = 14.78
assumed_live_balance_usd = 0.0

[trader_cohort]
leaderboard_windows = "WEEK,MONTH,ALL"
top_n = 50
min_trader_pnl = 1000.0
min_trader_volume = 2000.0
min_trader_roi = 0.03
trade_fetch_concurrency = 16
trade_lookback_minutes = 60

[discovery]
scan_limit = 1000
soon_hours = 72
fresh_signal_bonus = 10.0
priority_category_bonus = 6.0

[market_filters]
min_liquidity_usd = 1000.0
min_volume_usd = 2000.0

[filters]
min_consensus = 3
fallback_consensus = 3
min_copied_usdc = 250.0
min_trade_usd = 5.0
max_chase_premium = 0.08
price_min = 0.05
price_max = 0.95
max_absolute_spread = 0.05
max_relative_spread = 0.20
signal_staleness_seconds = 5
min_hours_to_close = 0.5
max_hours_to_close = 4.0
max_orders_per_tick = 0
max_sports_positions = 2
sports_score_penalty = 12.0

[crypto]
min_buy_price = 0.70
min_hours_to_close = 6.0
max_hours_to_close = 4.0
min_copied_usdc = 1500.0
min_consensus = 4
micro_min_consensus = 4
micro_max_entry_slippage = 0.03
micro_max_trade_usd = 3.0

[execution]
max_entry_slippage = 0.05
pending_order_ttl_seconds = 30
min_sell_usd = 1.0

[exits]
take_profit_ladder = "0.5:0.25,1.0:0.50,2.0:0.25,3.0:0.15"
trailing_stop_arm_pct = 0.20
trailing_stop_giveback = 0.40
peak_protect_arm_pct = 0.75
peak_protect_exit_pct = 0.30
stop_loss_pct = 0.30
stop_loss_min_age_minutes = 15
max_hold_hours = 24.0
near_expiry_min_profit = 0.05
near_expiry_minutes_to_close = 20
resolved_market_threshold = 0.97

[cohort_exit]
enabled = true
lookback_minutes = 90
min_age_minutes = 20
min_wallets = 2

[deep_fallback]
enabled = false
min_copied_usdc = 500.0

[reverse_lookup]
enabled = true
max_tokens = 30
min_copied_usdc = 200.0
min_liquidity_usd = 500.0
min_volume_usd = 1000.0

[btc_edge]
enabled = true
per_trade_cap_usd = 3.0
min_edge_over_market = 0.10
min_buy_price = 0.10
max_buy_price = 0.90
max_spread = 0.03
min_trade_usd = 1.0
min_model_probability = 0.92
min_hours_to_close = 1.0
volatility_days = 7

[noise_fallback]
enabled = false
max_trades_per_tick = 2
stake_usd = 7.39
cash_pressure_threshold = 0.50
min_buy_price = 0.25
max_buy_price = 0.75
max_spread = 0.03

[auto_tune]
enabled = true
min_closed_trades = 30

[persistence]
# Strict : 3/3 sur intersection ET cache à 80%.
enabled = true
window_days = 30
cache_threshold = 0.80
intersect_periods = "WEEK,MONTH,ALL"
intersect_min = 3

[telemetry]
quiet = false
auto_interval_seconds = 10
