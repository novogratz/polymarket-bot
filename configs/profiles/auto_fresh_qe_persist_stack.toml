# auto_fresh_qe_persist_stack — derived from auto_baseline_fresh_qe_combo
# Hypothesis: top winner (100% WR n=3) currently uses single-window WEEK cohort. Adding the persistence filter (#3's edge — multi-window WEEK/MONTH/ALL intersect ≥2) should reject one-off lucky wallets without touching the fresh-lookback or defensive exits that produced 66.6% ROI.
#
# Promoted to live 2026-05-20. Dry lineage: 14 closed / 64% WR /
# +$24.63 realized / avg_win $3.96 vs avg_loss $2.21 (asymmetry runs
# right way). starting_cash scaled to the running ledger equity
# (~$33.53) — live state preserved across the swap (journal +
# baseline kept). assumed_live_balance_usd matches live equity for
# sizing math.
[run]
starting_cash = 33.53

[sizing]
