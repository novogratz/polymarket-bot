# auto_liquidity_absorption_micro — new lane, no parent in auto_ list yet
# Hypothesis: liquidity_absorption fires when large size sits in the book; size tiny ($1.20) with ultra-fast TP 9% / SL 5% to maximize closed-trade count and break the 0% win-rate logjam.
[run]
starting_cash = 100.0
mode = "liquidity_absorption"

[sizing]
max_position_ceiling_usd = 2.0
min_open_positions = 0
starter_trade_usd = 1.2

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 1200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 1500.0
min_volume_24h_usd = 1500.0
min_price = 0.08
max_price = 0.92
max_spread = 0.03
stake_usd = 1.2
stake_pct = 0.012
max_orders_per_tick = 5
cash_floor_pct = 0.05
tp_pct = 0.09
sl_pct = 0.05
sl_min_age_minutes = 1
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 90
stdout_heartbeat_minutes = 15