# auto_mombreak_locktight — derived from momentum_breakout_aggressive.
# Dry-race lineage: 39 closed / 74% WR / +$12.40 realized at $20 baseline.
# Promoted to live 2026-05-20. Live config mirrors the dry-validated
# config exactly — only the absolute USD numbers are scaled for the
# $8.49 post-bleed bankroll. Ratios (stake_pct, ceiling %, cash floor,
# TP/SL, max_orders) all match the dry version that earned the 39c
# track record.
# Hypothesis: parent rides TP=0.50; lock at +25% instead.
[run]
starting_cash = 8.49
mode = "championdumonde_breakout"

[sizing]
# 75% ceiling matches dry ($15 on $20). On $8.49 → $6.37.
# starter mirrors the dry $5/$20 = 25% ratio → $2.12.
max_position_ceiling_usd = 6.37
min_open_positions = 0
starter_trade_usd = 2.12
assumed_live_balance_usd = 8.49

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
# stake_pct 0.25 matches dry. On $8.49 → $2.12 per trade (clears the
# Polymarket $1 min BUY). stake_usd is the absolute floor.
stake_usd = 2.12
stake_pct = 0.25
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.25
sl_pct = 0.35
sl_min_age_minutes = 5
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = false
auto_interval_seconds = 10
stdout_heartbeat_minutes = 15