# auto_mombreak_locktight — derived from momentum_breakout_aggressive.
# Dry-race lineage: 39 closed / 74% WR / +$12.40 realized at $20 baseline.
# Promoted to live 2026-05-20. Live config is BYTE-IDENTICAL to the
# dry-validated config (same $20 bankroll, same ratios, same absolute
# numbers). User fresh-deposits $20 and the bot runs the exact strategy
# that earned the 39-closed track record.
# Hypothesis: parent rides TP=0.50; lock at +25% instead.
[run]
starting_cash = 20.0
mode = "championdumonde_breakout"

[sizing]
max_position_ceiling_usd = 15.0
min_open_positions = 0
starter_trade_usd = 5.0
assumed_live_balance_usd = 20.0

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 8.0
stake_pct = 0.25
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.25
sl_pct = 0.35
sl_min_age_minutes = 5
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = false
auto_interval_seconds = 10
stdout_heartbeat_minutes = 15