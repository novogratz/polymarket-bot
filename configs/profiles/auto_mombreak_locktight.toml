# auto_mombreak_locktight — derived from momentum_breakout_aggressive.
# Dry-race lineage: 39 closed / 74% WR / +$12.40 realized at $20 baseline.
# Live config keeps the dry-validated RATIOS (stake_pct, ceiling %,
# cash floor, TP/SL) — only the absolute USD numbers scale to the
# $28.57 starting bankroll (user fresh-deposit 2026-05-20).
# Hypothesis: parent rides TP=0.50; lock at +25% instead.
[run]
starting_cash = 28.57
mode = "championdumonde_breakout"

[sizing]
# 75% ceiling matches dry ($15/$20). On $28.57 → $21.43.
# starter mirrors dry $5/$20 = 25% → $7.14.
max_position_ceiling_usd = 21.43
min_open_positions = 0
starter_trade_usd = 7.14
assumed_live_balance_usd = 28.57

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
# stake_pct 0.25 matches dry. On $28.57 → $7.14 per trade.
stake_usd = 11.43
stake_pct = 0.25
max_orders_per_tick = 5
cash_floor_pct = 0.02
tp_pct = 0.25
sl_pct = 0.35
sl_min_age_minutes = 5
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = false
auto_interval_seconds = 10
stdout_heartbeat_minutes = 15