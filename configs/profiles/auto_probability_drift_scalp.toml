# auto_probability_drift_scalp — derived from probability_drift
# Hypothesis: probability_drift mode is unspawned; if drift signals have real edge they should produce a steady stream of small TP wins; test with classic 8/4 scalp (TP wider than SL because drift implies directional persistence) at micro stake to keep blast radius bounded
[run]
starting_cash = 20.0
mode = "probability_drift"

[sizing]
max_position_ceiling_usd = 2.5
min_open_positions = 0
starter_trade_usd = 1.5

[market_filters]
min_liquidity_usd = 600.0
min_volume_usd = 1500.0

[persistence]
enabled = false

[race]
max_hours = 2.0
scan_limit = 500
min_liquidity_usd = 1500.0
min_volume_24h_usd = 2000.0
min_price = 0.10
max_price = 0.90
max_spread = 0.03
stake_usd = 1.5
stake_pct = 0.07
max_orders_per_tick = 3
cash_floor_pct = 0.05
tp_pct = 0.08
sl_pct = 0.04
sl_min_age_minutes = 2
near_expiry_minutes = 3
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 95
stdout_heartbeat_minutes = 15