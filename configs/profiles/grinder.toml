# Profile "grinder" — heavy-favorite, ride-to-resolution.
#
# Thesis: buy at 0.89–0.94, hold until bid ≥ 0.99 (full resolution).
# No stop-loss — these are high-probability near-certainty bets.
# All-in sizing: 95% of cash per trade, one position at a time.
# Exclusion filters block gap-risk markets (exact scores, weather, O/U 0.5/5.5+).
# Price-stability filter blocks markets that moved >10% today (live-game flux).

[run]
starting_cash = 123.0
mode = "grinder"

[sizing]
# 95% of cash per trade — one big bet at a time. The 5% floor covers fees.
max_position_ceiling_usd = 0.0
max_position_ceiling_pct = 0.99
cash_floor_pct = 0.05
position_pct = 0.95
min_open_positions = 0
starter_trade_usd = 1.5
assumed_live_balance_usd = 123.0
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.95

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 300.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 750

min_liquidity_usd = 500.0
min_volume_24h_usd = 300.0

# Entry band: 0.89–0.94. Wide enough to find trades, tight enough to
# only touch near-certainty markets. With no SL, we need strong conviction.
min_price = 0.89
max_price = 0.94

# Price stability: skip markets that moved >10% today.
max_day_change_pct = 0.10

# Tight spread — 2¢ max.
max_spread = 0.02

# 95% all-in per trade, one at a time.
stake_usd = 1.0
stake_pct = 0.95
max_orders_per_tick = 1
cash_floor_pct = 0.05

# Exits:
#   tp_pct = 1.0 → effectively disabled (100% gain never happens here).
#   sl_pct = 1.0 → effectively disabled (only fires if price hits 0).
#   resolved_exit at bid ≥ 0.99 → hold until full resolution, collect max value.
#   max_hold_hours = 4.5 → backstop so nothing lingers past expiry.
tp_pct = 1.0
sl_pct = 1.0
sl_min_age_minutes = 1
near_expiry_minutes = 5
resolved_exit_threshold = 0.99

# Arb disabled — CLOB bid/ask sides need audit before re-enabling.
arb_threshold = 0.0
arb_max_stake_usd = 5.0

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15

[filters]
max_orders_per_tick = 1
max_hours_to_close = 4.0
min_trade_usd = 1.0
max_absolute_spread = 0.02
max_relative_spread = 0.08
max_chase_premium = 0.03

[noise_fallback]
enabled = false

[discovery]
soon_hours = 1

[crypto]
max_hours_to_close = 1.0

[execution]
max_entry_slippage = 0.02

[exits]
stop_loss_pct = 1.0
stop_loss_min_age_minutes = 1
max_hold_hours = 4.5
near_expiry_exit_losers = false
near_expiry_loser_minutes = 5
