# Profile "grinder" — heavy-favorite, ride-to-resolution.
#
# Thesis: buy near-certainty binary outcomes at 0.87–0.95 within 4h of close,
# hold until bid ≥ 0.99. No stop-loss. 50% stake, 2 concurrent positions.
#
# Target: 2 wins/day → ~9%, 3 wins → ~13%. Each win = ~8.8% on stake = 4.4%
# on account. Wider band + faster tick = more eligible markets per day.
# Exclusion filters block all known gap-risk categories (exact scores, weather,
# O/U 0.5/5.5+). Price-stability filter blocks live-game flux (>10% day change).

[run]
starting_cash = 15.0
mode = "grinder"

[sizing]
# 50% per trade — 2 wins/day hits ~9%, 3 wins hits ~13%.
# One loss = -50% on stake, painful but recoverable with one follow-up win.
# ceiling disabled (0) so stake scales with bankroll automatically.
max_position_ceiling_usd = 0.0
max_position_ceiling_pct = 0.54
cash_floor_pct = 0.05
position_pct = 0.50
min_open_positions = 0
starter_trade_usd = 1.5
assumed_live_balance_usd = 33.48
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.50

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 300.0

[persistence]
enabled = false

[race]
max_hours = 2.0
scan_limit = 750

min_liquidity_usd = 500.0
min_volume_24h_usd = 300.0

# Entry band 0.87–0.95. Wider band = more eligible markets per day.
# 0.87 still implies 87%+ certainty; price-stability gate (10% day change)
# blocks live-game flux at the lower end. Above 0.95 upside to 0.99 too thin.
min_price = 0.87
max_price = 0.95

# Price-stability gate: skip any market that moved >10% today.
# A live-game "No" on an exact score sits at 0.93 but can gap to 0.40 in one
# tick when a goal is scored. Stable-for-days is the real near-certainty play.
max_day_change_pct = 0.10

# Momentum filter: skip outcomes that fell >5% today.
# A market at 0.91 that was 0.96 this morning is trending away from resolution.
min_outcome_momentum = -0.05

# Tight spread — 2¢ max keeps the round-trip viable.
max_spread = 0.02

# 50% stake, up to 2 concurrent positions.
stake_usd = 1.0
stake_pct = 0.30
max_orders_per_tick = 2
cash_floor_pct = 0.05

# Exit rules:
#   tp_pct = 1.0      → TP disabled; ride to resolution.
#   sl_pct = 0.35     → SL at -35%: entry 0.94 exits at ~0.61, cuts mid-game bleed.
#   resolved at 0.99  → exit when the market prints near-final resolution value.
#   max_hold 4.5h     → backstop so nothing lingers after expiry.
tp_pct = 1.0
sl_pct = 0.35
sl_min_age_minutes = 5
near_expiry_minutes = 5
resolved_exit_threshold = 0.99

# Binary arb disabled (set arb_threshold = 0.97 to re-enable).
# Sizing now uses proportional stakes (larger stake on the expensive/likely
# leg) so the guaranteed payout is equal regardless of outcome.
arb_threshold = 0.0
arb_max_stake_usd = 5.0

[telemetry]
quiet = false
auto_interval_seconds = 10
stdout_heartbeat_minutes = 15

[filters]
max_orders_per_tick = 2
max_hours_to_close = 4.0
min_trade_usd = 1.0
max_absolute_spread = 0.02
max_relative_spread = 0.08
max_chase_premium = 0.03

[noise_fallback]
enabled = false

[discovery]
soon_hours = 1

[crypto]
max_hours_to_close = 1.0

[execution]
max_entry_slippage = 0.02

[exits]
stop_loss_pct = 1.0
stop_loss_min_age_minutes = 1
max_hold_hours = 4.5
near_expiry_exit_losers = false
near_expiry_loser_minutes = 5
