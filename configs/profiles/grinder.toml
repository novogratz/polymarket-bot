# Profile "grinder" — heavy-favorite, near-resolution scalp.
#
# Thesis: a market sitting at bid ∈ [0.88, 0.95] with < 3h to close is
# pricing near-certainty. Pay the spread, take +6%, rotate. The edge is
# the implied-probability gap between the bid and the binary outcome
# actually resolving in the buyer's favor; the -15% SL caps the rare
# "favorite flips" case.
#
# Designed for $6 live bankroll, ALL-IN stake/trade (full balance), one
# position at a time. Bet size scales with the bankroll automatically.

[run]
starting_cash = 6.0
mode = "grinder"

[sizing]
# ALL-IN sizing (2026-05-26): each bet uses the full available balance.
# race_stake_pct = 1.0 targets 100% of equity; the position ceiling is
# disabled (0 = no cap) so the stake scales with the bankroll — a $6
# balance bets ~$6, a $50 balance bets ~$50. cash_floor_pct = 0 leaves
# no cash idle; only the $1 CLOB minimum gates the trade. One position
# at a time (max_orders_per_tick = 1) so the whole balance rides one bet.
max_position_ceiling_usd = 0.0
max_position_ceiling_pct = 1.0
cash_floor_pct = 0.0
position_pct = 1.0
min_open_positions = 0
starter_trade_usd = 1.5
assumed_live_balance_usd = 6.0
max_trade_usd = 0.0
high_conviction_balance_fraction = 1.0

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 300.0

[persistence]
enabled = false

[race]
# Time-to-close gate — grinder trades the last 3h before close. Widened
# from 1h (2026-05-26) so the bot finds an eligible market most hours of
# the day instead of sitting idle; still well inside the 4h-only rule.
max_hours = 3.0
scan_limit = 750

# Liquidity / volume floors. Heavy-favorite markets resolving in <1h
# tend to be thin — $500 / $300 is the realistic floor on Polymarket.
min_liquidity_usd = 500.0
min_volume_24h_usd = 300.0

# Heavy-favorite band: 0.88 floor avoids mid-range coinflips; 0.95
# ceiling preserves room above (6% to TP, 2% to resolved_exit at 0.97).
min_price = 0.88
max_price = 0.95

# Tight spread is non-negotiable — paying 4¢ spread on a 6¢ TP wipes
# the edge. 2¢ max keeps the round-trip viable.
max_spread = 0.02

# ALL-IN per-trade stake: equity × 100%. stake_usd is the absolute
# floor that clears the $1 CLOB minimum; with the ceiling disabled the
# stake is just (all cash above floor), so the bet scales with balance.
stake_usd = 1.0
stake_pct = 1.0

# One all-in BUY per tick — the full balance rides a single bet.
max_orders_per_tick = 1
cash_floor_pct = 0.0

# Grinder exits — the whole strategy hinges on these.
#   TP +6%: small but enough to clear the spread + fees on this band.
#   SL -15%: catastrophic-flip guard. Buying at 0.90, this exits at 0.765.
#   sl_min_age = 1 min: markets close in <1h, can't wait the 15 min the
#     other race profiles use.
#   resolved at bid ≥ 0.97: any position whose price ran toward 1.0
#     gets force-closed at the universal sweep threshold.
tp_pct = 0.06
sl_pct = 0.15
sl_min_age_minutes = 1
near_expiry_minutes = 5
resolved_exit_threshold = 0.99
# Daily drawdown halt stays at the race default (-15%) — race profile
# loader doesn't expose [race].daily_drawdown_pct. Override via env
# POLYMARKET_RACE_DAILY_DRAWDOWN_PCT=0.10 if a tighter halt is desired.

[telemetry]
quiet = false
auto_interval_seconds = 30
stdout_heartbeat_minutes = 15

[filters]
max_orders_per_tick = 1
max_hours_to_close = 3.0
min_trade_usd = 1.0
max_absolute_spread = 0.02
max_relative_spread = 0.10
max_chase_premium = 0.04

[noise_fallback]
enabled = false

[discovery]
soon_hours = 1

[crypto]
max_hours_to_close = 1.0

[execution]
max_entry_slippage = 0.02

[exits]
stop_loss_pct = 0.15
stop_loss_min_age_minutes = 1
# Hold long enough for a position bought near the 3h entry edge to reach
# its +6% TP or resolution before the max-hold backstop flushes it.
max_hold_hours = 3.5
near_expiry_exit_losers = true
near_expiry_loser_minutes = 5
