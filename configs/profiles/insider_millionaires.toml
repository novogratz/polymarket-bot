# Profil "insider_millionaires" — copy top 30 lifetime-PnL wallets ≥ $500k.
#
# Thesis: same as insider_whales but a wider cohort (top 30 with
# ≥$500k lifetime PnL vs top 10 with ≥$1M). Trades fire more often,
# but signal-per-trade is slightly diluted.
#
# Asymmetric exits + cohort-sell tracking: when one of the
# millionaires SELLS, we follow.

[run]
starting_cash = 20.0

[sizing]
position_pct = 0.15
max_position_ceiling_usd = 17.73
max_position_ceiling_pct = 0.35
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.35
cash_floor_pct = 0.02
min_open_positions = 0
starter_trade_usd = 7.39
assumed_live_balance_usd = 20.0

[trader_cohort]
leaderboard_window = "ALL"
top_n = 30                                # Top 30 lifetime
min_trader_pnl = 500000.0                 # ≥ $500k lifetime PnL
min_trader_volume = 50000.0
min_trader_roi = 0.04
trade_fetch_concurrency = 16
trade_lookback_minutes = 90

[discovery]
scan_limit = 1000
soon_hours = 72
fresh_signal_bonus = 8.0
priority_category_bonus = 5.0

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 500.0

[filters]
min_consensus = 1                         # Single millionaire suffices
fallback_consensus = 1
min_copied_usdc = 750.0                   # Slightly lower bar than whales
min_trade_usd = 1.0
max_chase_premium = 0.20
price_min = 0.03
price_max = 0.97
max_absolute_spread = 0.12
max_relative_spread = 0.45
signal_staleness_seconds = 10
min_hours_to_close = 0.25
max_hours_to_close = 4.0
max_orders_per_tick = 0
max_sports_positions = 3
sports_score_penalty = 0.0

[crypto]
min_buy_price = 0.50
min_hours_to_close = 6.0
max_hours_to_close = 4.0
min_copied_usdc = 1500.0
min_consensus = 1
micro_min_consensus = 1
micro_max_entry_slippage = 0.08
micro_max_trade_usd = 5.0

[execution]
max_entry_slippage = 0.12
pending_order_ttl_seconds = 30
min_sell_usd = 1.0

[exits]
take_profit_ladder = "0.35:0.20,0.75:0.30,1.5:0.30,2.5:0.20"
trailing_stop_arm_pct = 0.35
trailing_stop_giveback = 0.40
peak_protect_arm_pct = 1.5
peak_protect_exit_pct = 0.60
stop_loss_pct = 0.30
stop_loss_min_age_minutes = 10
max_hold_hours = 4.0
near_expiry_min_profit = 0.05
near_expiry_minutes_to_close = 20
resolved_market_threshold = 0.97

[cohort_exit]
enabled = true
lookback_minutes = 90
min_age_minutes = 15
min_wallets = 1

[deep_fallback]
enabled = false

[reverse_lookup]
enabled = true
max_tokens = 75
min_copied_usdc = 400.0
min_liquidity_usd = 200.0
min_volume_usd = 500.0

[btc_edge]
enabled = false

[noise_fallback]
enabled = false

[auto_tune]
enabled = true
min_closed_trades = 25

[persistence]
enabled = true
window_days = 90
cache_threshold = 0.50
intersect_periods = "WEEK,MONTH,ALL"
intersect_min = 2

[telemetry]
quiet = true
auto_interval_seconds = 50
stdout_heartbeat_minutes = 15
