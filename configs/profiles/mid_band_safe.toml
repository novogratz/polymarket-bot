# mid_band_safe — avoid both extremes
#
# Thesis: extreme prices (>0.90 or <0.15) carry tail risk that crushed the
# cohort. Mid-band (0.30-0.70) markets are coin-flippy by definition, but
# the bot uses smart-money consensus to find the few where the cohort
# actually has edge. Avoids the lottery-ticket trap AND the
# "locked-in-but-might-flip" trap. Tight TP ladder to lock small wins.
#
# Risk: by definition no easy wins. Needs real cohort edge to be +EV.

[run]
starting_cash = 10.0

[sizing]
position_pct = 0.10
max_position_ceiling_usd = 3.0
max_position_ceiling_pct = 0.30
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.30
cash_floor_pct = 0.02
min_open_positions = 3
starter_trade_usd = 2.0
assumed_live_balance_usd = 10.0

[trader_cohort]
leaderboard_window = "WEEK"
top_n = 100
min_trader_pnl = 500.0
min_trader_volume = 1000.0
min_trader_roi = 0.05
trade_fetch_concurrency = 16
trade_lookback_minutes = 240

[discovery]
scan_limit = 1000
soon_hours = 24
fresh_signal_bonus = 8.0
priority_category_bonus = 6.0

[market_filters]
min_liquidity_usd = 1500.0
min_volume_usd = 3000.0

[filters]
# Mid-band only: 0.30-0.70. Excludes both lottery tickets and locked winners.
min_consensus = 1
fallback_consensus = 1
min_copied_usdc = 25.0
min_trade_usd = 1.0
max_chase_premium = 0.15
price_min = 0.30
price_max = 0.70
max_absolute_spread = 0.08
max_relative_spread = 0.25
signal_staleness_seconds = 60
min_hours_to_close = 0.5
max_hours_to_close = 4.0
max_orders_per_tick = 0
max_sports_positions = 2
sports_score_penalty = 8.0

[crypto]
min_buy_price = 0.30
min_hours_to_close = 0.5
max_hours_to_close = 4.0
min_copied_usdc = 500.0
min_consensus = 2
micro_min_consensus = 2
micro_max_entry_slippage = 0.05
micro_max_trade_usd = 3.0

[execution]
max_entry_slippage = 0.05
pending_order_ttl_seconds = 45
min_sell_usd = 0.5

[exits]
take_profit_ladder = "0.15:0.30,0.30:0.40,0.50:0.30"
trailing_stop_arm_pct = 0.15
trailing_stop_giveback = 0.40
peak_protect_arm_pct = 0.30
peak_protect_exit_pct = 0.15
stop_loss_pct = 0.25
stop_loss_min_age_minutes = 10
max_hold_hours = 4.0
near_expiry_min_profit = 0.05
near_expiry_minutes_to_close = 20
resolved_market_threshold = 0.95

[cohort_exit]
enabled = true
lookback_minutes = 120
min_age_minutes = 15
min_wallets = 2

[deep_fallback]
enabled = false

[reverse_lookup]
enabled = false

[btc_edge]
enabled = false
per_trade_cap_usd = 5.0
min_edge_over_market = 0.08
min_buy_price = 0.05
max_buy_price = 0.95
max_spread = 0.04
min_trade_usd = 1.0
min_model_probability = 0.90
min_hours_to_close = 0.5
volatility_days = 7

[noise_fallback]
enabled = false
max_trades_per_tick = 2
stake_usd = 1.50
cash_pressure_threshold = 0.35
min_buy_price = 0.30
max_buy_price = 0.70
max_spread = 0.05

[auto_tune]
enabled = false

[persistence]
enabled = false

[telemetry]
quiet = false
auto_interval_seconds = 10
