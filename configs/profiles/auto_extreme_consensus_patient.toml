# auto_extreme_consensus_patient — derived from claude_extreme_consensus
# Hypothesis: counter-test to the high-frequency micro_discipline/ultra_scalp pair — when 5+ wallets converge on the same token in a tight window, the trade can run; use larger ceiling ($6), wider TP (+30%) and looser SL (-18%) to let strong consensus play out instead of micro-cutting at 5%
[run]
starting_cash = 100.0
mode = "claude_extreme_consensus"

[sizing]
max_position_ceiling_usd = 6.0
min_open_positions = 0
starter_trade_usd = 3.0

[market_filters]
min_liquidity_usd = 800.0
min_volume_usd = 2500.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 2500.0
min_volume_24h_usd = 3000.0
min_price = 0.12
max_price = 0.88
max_spread = 0.03
stake_usd = 3.0
stake_pct = 0.15
max_orders_per_tick = 2
cash_floor_pct = 0.05
tp_pct = 0.30
sl_pct = 0.18
sl_min_age_minutes = 3
near_expiry_minutes = 8
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 120
stdout_heartbeat_minutes = 15