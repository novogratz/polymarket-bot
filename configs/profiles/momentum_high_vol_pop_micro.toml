# momentum_high_vol_pop_micro — claude_high_vol_pop + micro stakes
# Thesis: high-vol pops have edge but variance; spread risk across many tiny bets
[run]
starting_cash = 20.0
mode = "claude_high_vol_pop"

[sizing]
max_position_ceiling_usd = 3.0
min_open_positions = 0
starter_trade_usd = 2.0

[market_filters]
min_liquidity_usd = 200.0
min_volume_usd = 200.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 500.0
min_volume_24h_usd = 200.0
min_price = 0.05
max_price = 0.95
max_spread = 0.05
stake_usd = 2.0
stake_pct = 0.06
max_orders_per_tick = 8
cash_floor_pct = 0.02
tp_pct = 0.25
sl_pct = 0.18
sl_min_age_minutes = 3
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 80
stdout_heartbeat_minutes = 30
