# Profile "grinder_zaza" — Zaza's bot (run_live_zaza.sh). Independent of the
# shared grinder.toml (bot 3): editing this never affects the other bots and
# vice versa, so all bots can push/pull main freely (they own different files).
# Exact copy of bot 3's grinder.toml strategy; only the bankroll baseline
# differs. Runs from its OWN clone (polymarket-bot-zaza) with its OWN .env
# (Zaza's wallet credentials) so ledgers and wallets can never cross.
#
# Profile "grinder" — heavy-favorite, ride-to-resolution.
#
# Thesis: buy near-certainty binary outcomes within 8h of close,
# hold until bid ≥ 0.99. No general stop-loss (soccer moneyline only).
# Exclusion filters block all known gap-risk categories (exact scores, weather,
# O/U 0.5/5.5+).

[run]
# Zaza's deposit in USDC ($100 per user 2026-06-11). Total P&L tracks
# from here. Must match POLYMARKET_PAPER_BALANCE_USD /
# POLYMARKET_ASSUME_LIVE_BALANCE_USD in scripts/run_live_zaza.sh — a mismatch
# skews the "since start" % in the LIVE REPORT.
starting_cash = 100.0
mode = "grinder"

[sizing]
# 50% per trade — 2 wins/day hits ~9%, 3 wins hits ~13%.
# One loss = -50% on stake, painful but recoverable with one follow-up win.
# ceiling disabled (0) so stake scales with bankroll automatically.
max_position_ceiling_usd = 0.0
max_position_ceiling_pct = 0.54
cash_floor_pct = 0.05
position_pct = 0.50
min_open_positions = 0
starter_trade_usd = 1.5
# Keep equal to starting_cash above.
assumed_live_balance_usd = 100.0
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.50

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 300.0

[persistence]
enabled = false

[race]
# Synced to bot 1 (main grinder.toml) / bot 3 strategy 2026-06-16 (user:
# "bring the same strategy as bot 1, the best bot ever"). Only the bankroll
# baseline (starting_cash / assumed_live_balance_usd above) and scan_limit
# differ from bot 1.
#
# Entry window 4h -> 8h (user 2026-06-17: "not enough bets"). Within 4h there's
# usually only ~1 game and one-bet-per-game takes a single bet from it, so few
# positions despite plenty of cash; 8h roughly doubles the distinct games in
# the window (still same-day, no overnight holds). Hard cap (max_hours_cap=0 ->
# single 8h window, no laddering).
max_hours = 8.0
max_hours_cap = 0.0
daily_expiry_fallback = false
# 750 markets/ordering (user 2026-06-16: match bot 1 exactly — full scan
# breadth past the Gamma 100-row page cap, ~1,000-2,000 raw markets/tick).
scan_limit = 750

min_liquidity_usd = 500.0
min_volume_24h_usd = 300.0

# Entry band 0.85–0.97 (2026-05-30). Lower bound 0.85 carries a bit more gap
# risk than 0.90, but the catastrophic categories (exact scores, coinflips,
# weather) stay excluded and the per-bet cap bounds any single loss. Upper
# bound 0.97 still leaves room up to ~1.0.
min_price = 0.85
max_price = 0.97

# Spread 4¢ bounds slippage on the wider band's slightly thinner books.
max_spread = 0.04

# 15% = the HARD per-position cap (user 2026-06-14). Fresh entries open at the
# lower initial_stake_pct (5%) and the dip double-down fills the reserved
# headroom up to 15% — so the double-down always has room to add.
stake_usd = 1.0
stake_pct = 0.15
initial_stake_pct = 0.05
# Dip double-down (user 2026-06-14, generalized): add to ANY held position
# whose live ask has dipped below entry while it's still a favorite
# (ask ≥ min_price 0.60). Once per position, never past the per-bet cap.
double_down_enabled = true
double_down_min_dip = 0.01
double_down_max_dip = 0.40
double_down_min_price = 0.60
max_orders_per_tick = 4
cash_floor_pct = 0.01

# Exit rules (match grinder.toml / bot 1):
#   tp_pct = 1.0          → TP disabled; ride to resolution.
#   sl_pct = 0.25         → CONTROLLED SL at -25%, SOCCER MONEYLINE ONLY,
#                           confirmed over sl_confirm_ticks (3). All other
#                           markets NEVER stop out (gate in
#                           _is_soccer_moneyline_position).
#   resolved at 0.97      → exit only when a REAL live-book bid clears the
#                           dynamic threshold; min_profit_margin floors it
#                           above entry so a 0.97 entry sells at 0.99.
#   max_hold 4.5h         → backstop so nothing lingers after expiry.
tp_pct = 1.0
sl_pct = 0.25            # -25% confirmed SL, soccer moneyline only
sl_confirm_ticks = 3
sl_min_age_minutes = 5
near_expiry_minutes = 5
resolved_exit_threshold = 0.97
# Dynamic TP (2026-06-15): exit must clear entry by this, capped 0.99 —
# a 0.97 entry sells at 0.99, never break-even.
min_profit_margin = 0.02

# Binary arb disabled (set arb_threshold = 0.97 to re-enable).
arb_threshold = 0.0
arb_max_stake_usd = 5.0

[telemetry]
quiet = false
auto_interval_seconds = 10
stdout_heartbeat_minutes = 15

[filters]
max_orders_per_tick = 2
max_hours_to_close = 4.0
min_trade_usd = 1.0
max_absolute_spread = 0.02
max_relative_spread = 0.08
max_chase_premium = 0.03

[noise_fallback]
enabled = false

[btc_edge]
# BTC/ETH price threshold markets — fills dead time between sports sessions.
# Black-Scholes model checks if current price gives ≥75% prob of staying above/below
# threshold. Resolves every hour. Small cap ($5) — crypto is more volatile.
enabled = false
min_model_probability = 0.75
min_edge_over_market = 0.05
min_buy_price = 0.75
max_buy_price = 0.97
max_spread = 0.02
min_trade_usd = 1.0
per_trade_cap_usd = 5.0
min_hours_to_close = 0.08
volatility_days = 7

[discovery]
soon_hours = 1

[crypto]
max_hours_to_close = 1.0

[execution]
max_entry_slippage = 0.02

[exits]
stop_loss_pct = 1.0
stop_loss_min_age_minutes = 1
max_hold_hours = 4.5
near_expiry_exit_losers = false
near_expiry_loser_minutes = 5
