# Profile "grinder_zaza" — Zaza's bot (run_live_zaza.sh). Independent of the
# shared grinder.toml (bot 3): editing this never affects the other bots and
# vice versa, so all bots can push/pull main freely (they own different files).
# Exact copy of bot 3's grinder.toml strategy; only the bankroll baseline
# differs. Runs from its OWN clone (polymarket-bot-zaza) with its OWN .env
# (Zaza's wallet credentials) so ledgers and wallets can never cross.
#
# Profile "grinder" — heavy-favorite, ride-to-resolution.
#
# Thesis: buy near-certainty binary outcomes within 8h of close,
# hold until bid ≥ 0.99. No general stop-loss (soccer moneyline only).
# Exclusion filters block all known gap-risk categories (exact scores, weather,
# O/U 0.5/5.5+).

[run]
# Zaza's deposit in USDC ($100 per user 2026-06-11). Total P&L tracks
# from here. Must match POLYMARKET_PAPER_BALANCE_USD /
# POLYMARKET_ASSUME_LIVE_BALANCE_USD in scripts/run_live_zaza.sh — a mismatch
# skews the "since start" % in the LIVE REPORT.
starting_cash = 100.0
mode = "grinder"

[sizing]
# 50% per trade — 2 wins/day hits ~9%, 3 wins hits ~13%.
# One loss = -50% on stake, painful but recoverable with one follow-up win.
# ceiling disabled (0) so stake scales with bankroll automatically.
max_position_ceiling_usd = 0.0
max_position_ceiling_pct = 0.54
cash_floor_pct = 0.05
position_pct = 0.50
min_open_positions = 0
starter_trade_usd = 1.5
# Keep equal to starting_cash above.
assumed_live_balance_usd = 100.0
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.50

[market_filters]
min_liquidity_usd = 500.0
min_volume_usd = 300.0

[persistence]
enabled = false

[race]
# v4 strategy — FULLY matches bot 1 (main grinder.toml) / bot 3 (user
# 2026-06-22: "align strategy with bot 1"). Bot 1's volume comes from the v4
# mechanics below (unban-all + fixed $5 stake + 12 orders/tick), NOT the
# window — so zaza now uses bot 1's 4h window too (the 8h-for-volume hedge is
# dropped). Only the bankroll baseline ([run]/[sizing] above) differs from bot 1.
max_hours = 4.0
max_hours_cap = 0.0
daily_expiry_fallback = false
# 750 markets/ordering — full scan breadth past the Gamma 100-row page cap.
scan_limit = 750

# v4 liquidity floors (user 2026-06-21): min volume $1000, min liquidity $250.
min_liquidity_usd = 250.0
min_volume_24h_usd = 1000.0

# v4 entry band (user 2026-06-21): 0.80–0.94, with max_price_hard_cap = 0.96 as
# the ABSOLUTE ceiling (0.97/0.98/0.99 never tradeable).
min_price = 0.80
max_price = 0.94
max_price_hard_cap = 0.96

max_spread = 0.04

# ── v4 FIXED-DOLLAR SIZING (user 2026-06-21) ─────────────────────────────
# Every trade = EXACTLY $5, never more. No Kelly, no % of equity, no
# averaging-down, no double-down. Risk per trade is hard-capped at $5, so the
# full bankroll deploys across (bankroll / 5) positions. When fixed_stake_usd
# > 0 the stake_pct/initial_stake_pct knobs are IGNORED (legacy % mode only).
stake_usd = 1.0
fixed_stake_usd = 5.0
# v4: unban every category — governance shifts to the data-driven auto-disable
# below; per-trade risk is bounded by the $5 fixed stake.
unban_all_markets = true
# Ban crypto (user 2026-06-24): drop crypto markets even under unban_all —
# an always-on category exclusion. Diverges from bot 1 (which leaves crypto on).
ban_crypto = true
# Data-driven category auto-disable: after ≥ 100 realized trades in a category,
# drop it if ROI < −5%. Forward-looking — a fresh bot disables nothing.
category_min_samples = 100
category_disable_roi = -0.05
# v4 forecasting EV / quality gates — OPT-IN, 0 = off (a fresh bot would
# otherwise starve before it has history to calibrate).
min_edge = 0.0
min_quality_score = 0.0
forecast_prior = 0.95
preferred_volume_usd = 5000.0
# Resolution-safety filter (ALWAYS-ON): skip subjective/ambiguous settlement
# wording even under unban_all. The one structural protection that survives.
min_resolution_clarity = 60.0
stake_pct = 0.35
initial_stake_pct = 0.20
# v4: double-down / averaging-down DISABLED — fixed $5 only.
double_down_enabled = false
double_down_min_dip = 0.01
double_down_max_dip = 0.40
double_down_min_price = 0.60
# v4: open up to 12 new $5 positions per tick so the bankroll deploys fast
# across many distinct games (each still passes every entry filter; one bet
# per game/event). The $5 cap bounds risk regardless of count.
max_orders_per_tick = 12
cash_floor_pct = 0.01

# Exit rules (match grinder.toml / bot 1):
#   tp_pct = 1.0          → TP disabled; ride to resolution.
#   sl_pct = 0.30         → CONTROLLED SL at -30%, SPORT MONEYLINES ONLY,
#                           confirmed over sl_confirm_ticks (3). Politics/awards
#                           EXCLUDED; all else rides to resolution.
#   sl_min_exit_price 0.50 → SL only fires while the bid is still ≥ 0.50 (an
#                           orderly decline); a goal-crash gap below it
#                           mean-reverts, so HOLD.
#   resolved at 0.99      → winners exit at a real 0.99 bid, else ride to
#                           on-chain settlement at 1.00.
tp_pct = 1.0
sl_pct = 0.30            # -30% confirmed SL, sport moneylines (user 2026-06-16)
sl_confirm_ticks = 3
sl_min_age_minutes = 5
sl_min_exit_price = 0.50
near_expiry_minutes = 5
resolved_exit_threshold = 0.99
# Dynamic TP (2026-06-15): exit must clear entry by this, capped 0.99.
min_profit_margin = 0.02

# Binary arb disabled (set arb_threshold = 0.97 to re-enable).
arb_threshold = 0.0
arb_max_stake_usd = 5.0

[telemetry]
quiet = false
auto_interval_seconds = 10
stdout_heartbeat_minutes = 15

[filters]
max_orders_per_tick = 2
max_hours_to_close = 4.0
min_trade_usd = 1.0
max_absolute_spread = 0.02
max_relative_spread = 0.08
max_chase_premium = 0.03

[noise_fallback]
enabled = false

[btc_edge]
# BTC/ETH price threshold markets — fills dead time between sports sessions.
# Black-Scholes model checks if current price gives ≥75% prob of staying above/below
# threshold. Resolves every hour. Small cap ($5) — crypto is more volatile.
enabled = false
min_model_probability = 0.75
min_edge_over_market = 0.05
min_buy_price = 0.75
max_buy_price = 0.97
max_spread = 0.02
min_trade_usd = 1.0
per_trade_cap_usd = 5.0
min_hours_to_close = 0.08
volatility_days = 7

[discovery]
soon_hours = 1

[crypto]
max_hours_to_close = 1.0

[execution]
max_entry_slippage = 0.02

[exits]
stop_loss_pct = 1.0
stop_loss_min_age_minutes = 1
max_hold_hours = 4.5
near_expiry_exit_losers = false
near_expiry_loser_minutes = 5
