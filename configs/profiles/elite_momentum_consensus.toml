# Profil "elite_momentum_consensus" — Smart continuation strategy with volume confirmation.
# Buys into strong momentum moves backed by real volume, in liquid markets with tight spreads.
# Designed to fire regularly (1000+ volume vs 2500+ for whale_entry) while maintaining quality.

[run]
starting_cash = 20.0
mode = "elite_momentum_consensus"

[sizing]
max_position_ceiling_usd = 3.0
min_open_positions = 3
starter_trade_usd = 1.5
assumed_live_balance_usd = 20.0

max_position_ceiling_pct = 0.15
cash_floor_pct = 0.10
position_pct = 0.12
max_trade_usd = 0.0
high_conviction_balance_fraction = 0.20

[market_filters]
min_liquidity_usd = 300.0
min_volume_usd = 300.0

[persistence]
enabled = false

[race]
max_hours = 48.0
scan_limit = 750
min_liquidity_usd = 300.0
min_volume_24h_usd = 150.0
min_price = 0.15
max_price = 0.85
max_spread = 0.06
stake_usd = 1.5
stake_pct = 0.075
max_orders_per_tick = 4
cash_floor_pct = 0.10
tp_pct = 0.25
sl_pct = 0.20
sl_min_age_minutes = 5
near_expiry_minutes = 45
resolved_exit_threshold = 0.97

[telemetry]
quiet = false
auto_interval_seconds = 300
stdout_heartbeat_minutes = 15

[filters]
max_orders_per_tick = 4

max_hours_to_close = 48.0
min_trade_usd = 1.0
max_absolute_spread = 0.06
max_relative_spread = 0.35
max_chase_premium = 0.10

[noise_fallback]
enabled = false

[discovery]
soon_hours = 48

[crypto]
max_hours_to_close = 48.0

[execution]
max_entry_slippage = 0.06

[exits]
stop_loss_pct = 0.20
stop_loss_min_age_minutes = 5
max_hold_hours = 24.0
near_expiry_exit_losers = true
near_expiry_loser_minutes = 45

[news]
min_liquidity_usd = 300.0
min_volume_24h_usd = 150.0
max_spread = 0.06
stake_usd = 1.5
max_stake_usd = 1.5
max_orders_per_tick = 3

[edge]
min_liquidity_usd = 300.0
min_volume_24h_usd = 150.0
max_spread = 0.06
max_position_pct = 0.075
max_orders_per_tick = 3
