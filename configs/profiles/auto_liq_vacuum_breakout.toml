# auto_liq_vacuum_breakout — derived from liquidity_vacuum_breakout
# Hypothesis: race is missing a thin-book breakout lane — when liquidity is shallow (<$800) and a sudden buy gaps the price ≥5¢, the move tends to extend before mean-reverting; wider TP (+22%) to ride extension, tight SL (-12%) to bail if it's a head-fake
[run]
starting_cash = 20.0
mode = "liquidity_vacuum_breakout"

[sizing]
max_position_ceiling_usd = 3.5
min_open_positions = 0
starter_trade_usd = 1.8

[market_filters]
min_liquidity_usd = 150.0
min_volume_usd = 400.0

[persistence]
enabled = false

[race]
max_hours = 4.0
scan_limit = 500
min_liquidity_usd = 400.0
min_volume_24h_usd = 800.0
min_price = 0.05
max_price = 0.95
max_spread = 0.06
stake_usd = 1.8
stake_pct = 0.06
max_orders_per_tick = 4
cash_floor_pct = 0.05
tp_pct = 0.22
sl_pct = 0.12
sl_min_age_minutes = 2
near_expiry_minutes = 5
resolved_exit_threshold = 0.97

[telemetry]
quiet = true
auto_interval_seconds = 90
stdout_heartbeat_minutes = 15